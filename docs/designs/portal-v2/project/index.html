<!doctype html>

<title>OpenClaw · Managed Agents</title>
<style>
/* ============================================================
   OpenClaw Design System — Tokens + Semantic Classes
   Modern, editorial, Are.na-adjacent: monochrome paper, sans only,
   lobster orange used with extreme restraint.
   ============================================================ */

@import url("https://fonts.googleapis.com/css2?family=Inter:wght@400;450;500;600&family=JetBrains+Mono:wght@400;500&display=swap");

:root {
  /* ---------- Canvas & surfaces ---------- */
  --paper: #f5f4f0;          /* warm off-white canvas (Are.na-adjacent) */
  --paper-2: #eceae4;        /* hover on paper */
  --paper-3: #e3e0d8;        /* pressed */
  --card: #ffffff;           /* card fill */
  --scrim: rgba(20, 20, 19, 0.32);
  --chrome: rgba(245, 244, 240, 0.78);

  /* ---------- Ink ---------- */
  --ink: #141413;            /* primary text */
  --ink-2: #4a4843;          /* secondary */
  --ink-3: #817d74;          /* tertiary / labels */
  --ink-4: #b5b0a5;          /* disabled */
  --ink-inv: #f5f4f0;        /* on dark */

  /* ---------- Lines ---------- */
  --line: #e3e0d8;
  --line-2: #c9c4b7;
  --line-3: #141413;         /* hard line for editorial frames */

  /* ---------- Lobster — the single accent, used RARELY ---------- */
  --lobster: #ff4d14;
  --lobster-hover: #e64411;
  --lobster-press: #c23709;
  --lobster-soft: #ffe5da;
  --lobster-wash: #fff3ed;
  --lobster-ring: rgba(255, 77, 20, 0.32);

  /* ---------- Semantic ---------- */
  --ok: #2f7a4e;
  --warn: #a67318;
  --danger: #c23709;
  --info: #3a5fa8;

  /* ---------- Typography ---------- */
  --font-sans: "Inter", -apple-system, BlinkMacSystemFont, "Helvetica Neue", Helvetica, Arial, system-ui, sans-serif;
  --font-mono: "JetBrains Mono", ui-monospace, "SF Mono", Menlo, Consolas, monospace;

  --text-xs: 0.6875rem;   /* 11 */
  --text-sm: 0.8125rem;   /* 13 */
  --text-base: 0.9375rem; /* 15 */
  --text-md: 1.0625rem;   /* 17 */
  --text-lg: 1.375rem;    /* 22 */
  --text-xl: 1.875rem;    /* 30 */
  --text-2xl: 2.625rem;   /* 42 */
  --text-3xl: 4rem;       /* 64 */
  --text-4xl: 6rem;       /* 96 */

  --lh-tight: 1.05;
  --lh-snug: 1.25;
  --lh-normal: 1.5;

  --track-display: -0.035em;
  --track-body: -0.011em;
  --track-caps: 0.02em;

  /* ---------- Spacing ---------- */
  --s-1: 4px;
  --s-2: 8px;
  --s-3: 12px;
  --s-4: 16px;
  --s-6: 24px;
  --s-8: 32px;
  --s-12: 48px;
  --s-16: 64px;
  --s-24: 96px;
  --s-32: 128px;

  /* ---------- Radii — deliberately small ---------- */
  --r-xs: 2px;
  --r-sm: 4px;
  --r-md: 6px;
  --r-lg: 8px;
  --r-full: 9999px;

  /* ---------- Shadows — almost never ---------- */
  --shadow-1: 0 1px 0 rgba(20, 20, 19, 0.04);
  --shadow-2: 0 4px 16px rgba(20, 20, 19, 0.06);
  --shadow-3: 0 20px 40px rgba(20, 20, 19, 0.10);

  /* ---------- Motion ---------- */
  --d-instant: 120ms;
  --d-fast: 200ms;
  --d-med: 360ms;
  --ease: cubic-bezier(0.2, 0.7, 0.2, 1);

  --focus-ring: 0 0 0 2px var(--paper), 0 0 0 4px var(--lobster-ring);
}

/* ============================================================
   Base
   ============================================================ */

*, *::before, *::after { box-sizing: border-box; }

html, body { margin: 0; padding: 0; }

body {
  font-family: var(--font-sans);
  font-size: var(--text-sm);
  line-height: var(--lh-normal);
  letter-spacing: var(--track-body);
  color: var(--ink);
  background: var(--paper);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  font-feature-settings: "ss01", "cv11";
}

/* ============================================================
   Editorial type scale — ALL sans, Inter tight tracking,
   weights used sparingly (400/500 are the system; 600 is rare)
   ============================================================ */

.display-xl, h1.display {
  font-family: var(--font-sans);
  font-weight: 500;
  font-size: var(--text-4xl);
  line-height: var(--lh-tight);
  letter-spacing: -0.045em;
  color: var(--ink);
  margin: 0;
}

.display-lg {
  font-family: var(--font-sans);
  font-weight: 500;
  font-size: var(--text-3xl);
  line-height: var(--lh-tight);
  letter-spacing: -0.04em;
  color: var(--ink);
  margin: 0;
}

h1, .h1 {
  font-family: var(--font-sans);
  font-weight: 500;
  font-size: var(--text-2xl);
  line-height: var(--lh-tight);
  letter-spacing: var(--track-display);
  color: var(--ink);
  margin: 0;
}

h2, .h2 {
  font-family: var(--font-sans);
  font-weight: 500;
  font-size: var(--text-xl);
  line-height: 1.15;
  letter-spacing: -0.03em;
  color: var(--ink);
  margin: 0;
}

h3, .h3 {
  font-family: var(--font-sans);
  font-weight: 500;
  font-size: var(--text-lg);
  line-height: var(--lh-snug);
  letter-spacing: -0.022em;
  color: var(--ink);
  margin: 0;
}

h4, .h4 {
  font-family: var(--font-sans);
  font-weight: 500;
  font-size: var(--text-md);
  line-height: var(--lh-snug);
  letter-spacing: -0.018em;
  color: var(--ink);
  margin: 0;
}

p, .body {
  font-family: var(--font-sans);
  font-weight: 400;
  font-size: var(--text-sm);
  line-height: var(--lh-normal);
  color: var(--ink-2);
  margin: 0;
}

.body-lg {
  font-size: var(--text-base);
  line-height: 1.55;
}

.lede {
  font-family: var(--font-sans);
  font-weight: 400;
  font-size: var(--text-md);
  line-height: 1.5;
  letter-spacing: -0.015em;
  color: var(--ink-2);
}

.eyebrow, .label {
  font-family: var(--font-mono);
  font-weight: 400;
  font-size: var(--text-xs);
  letter-spacing: var(--track-caps);
  text-transform: uppercase;
  color: var(--ink-3);
}

.caption {
  font-family: var(--font-sans);
  font-weight: 400;
  font-size: var(--text-xs);
  line-height: 1.35;
  color: var(--ink-3);
}

code, .code, kbd {
  font-family: var(--font-mono);
  font-size: 0.92em;
  background: var(--paper-2);
  padding: 1px 5px;
  border-radius: var(--r-xs);
  color: var(--ink);
}

pre {
  font-family: var(--font-mono);
  font-size: var(--text-sm);
  line-height: 1.55;
  background: var(--paper-2);
  border: 1px solid var(--line);
  border-radius: var(--r-md);
  padding: var(--s-4);
  overflow-x: auto;
  margin: 0;
}

pre code { background: transparent; padding: 0; }

a {
  color: var(--ink);
  text-decoration: underline;
  text-underline-offset: 3px;
  text-decoration-thickness: 1px;
  text-decoration-color: var(--ink-3);
  transition: text-decoration-color var(--d-instant) var(--ease), color var(--d-instant) var(--ease);
}
a:hover { text-decoration-color: var(--lobster); color: var(--lobster-press); }

hr { border: 0; border-top: 1px solid var(--line); margin: var(--s-6) 0; }

::selection { background: var(--lobster-soft); color: var(--ink); }

:focus-visible {
  outline: none;
  box-shadow: var(--focus-ring);
  border-radius: var(--r-sm);
}

@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    transition-duration: 0.01ms !important;
  }
}

</style>
<style>
  html, body, #root { height: 100%; margin: 0; padding: 0; }
  body {
    background: var(--paper);
    overflow: hidden;
    font-feature-settings: "ss01", "cv11";
  }
  code { font-family: var(--font-mono); font-size: 0.92em; background: var(--paper-2); padding: 1px 5px; border-radius: 2px; color: var(--ink); }
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-thumb { background: var(--line-2); border-radius: 9999px; border: 3px solid var(--paper); }
  ::-webkit-scrollbar-thumb:hover { background: var(--ink-3); }
  ::-webkit-scrollbar-track { background: transparent; }

  @keyframes oc-blink { 0%, 49% { opacity: 1 } 50%, 100% { opacity: 0 } }
  @keyframes oc-pulse { 0%, 100% { opacity: 1 } 50% { opacity: 0.45 } }
  @keyframes oc-toast-in { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes oc-fade-in { from { opacity: 0; } to { opacity: 1; } }

  /* density modes */
  body.density-comfy { font-size: 15px; }
  body.density-compact { font-size: 13px; }

  /* ============================================================
     Responsive — progressively collapse topbar chrome.
     The dashboard is designed for ~1440px but must stay usable
     from ~980px up through ultrawide.
     ============================================================ */

  /* < 1400px: hide the noisy commit/tests strip */
  @media (max-width: 1399px) {
    .oc-commit { display: none !important; }
  }
  /* < 1240px: hide the "deployment_" prefix — the id carries the meaning */
  @media (max-width: 1239px) {
    .oc-deployment-prefix { display: none !important; }
    .oc-search { width: 200px !important; }
  }
  /* < 1120px: hide the "Managed Agents" sublabel on the wordmark */
  @media (max-width: 1119px) {
    .oc-brand-sub { display: none !important; }
    .oc-btn-docs { display: none !important; }
  }
  /* < 1000px: collapse search to a 28x28 icon button */
  @media (max-width: 999px) {
    .oc-search { display: none !important; }
    .oc-search-compact { display: grid !important; }
  }
  /* < 900px: drop the deployment breadcrumb entirely */
  @media (max-width: 899px) {
    .oc-topbar-mid { display: none !important; }
    .oc-topbar { grid-template-columns: 240px auto !important; }
  }
  /* < 760px: collapse sidebar to icon rail */
  @media (max-width: 759px) {
    .oc-sidebar { width: 56px !important; }
    .oc-sidebar-label, .oc-sidebar-eyebrow, .oc-sidebar-deploy, .oc-sidebar-footer-text, .oc-sidebar-count { display: none !important; }
    .oc-sidebar-item { justify-content: center !important; padding: 8px !important; }
    .oc-topbar { grid-template-columns: 56px auto !important; }
    .oc-brand-wrap { padding: 0 10px !important; }
  }

  /* Session split: drop the inspector pane below 1200px */
  @media (max-width: 1199px) {
    .oc-session-split { grid-template-columns: 1fr !important; }
    .oc-session-inspector { display: none !important; }
  }
  /* Narrow the session list below 1100px, drop it below 860px (rare) */
  @media (max-width: 1099px) {
    .oc-sessions-list { width: 300px !important; }
  }

  /* Tweaks panel: shrink on narrow screens so it doesn't swallow the UI */
  .oc-tweaks-panel { width: 320px; }
  @media (max-width: 1099px) {
    .oc-tweaks-panel { width: 280px !important; }
  }
  @media (max-width: 760px) {
    .oc-tweaks-panel {
      width: calc(100vw - 24px) !important;
      right: 12px !important; bottom: 12px !important;
    }
  }

  /* Data tables: allow horizontal scroll at narrow widths rather than breaking */
  .oc-table-scroll { overflow-x: auto; }
  .oc-table-scroll > * { min-width: 960px; }

  /* Overview: collapse 5-stat row to 2x/1x at narrow widths */
  @media (max-width: 1199px) {
    .oc-overview-split { grid-template-columns: 1fr !important; }
  }
  @media (max-width: 899px) {
    .oc-stats-row { grid-template-columns: repeat(2, 1fr) !important; }
    .oc-stats-cell:nth-child(2n) { border-right: 0 !important; }
    .oc-stats-cell { border-bottom: 1px solid var(--ink); }
  }
  @media (max-width: 520px) {
    .oc-stats-row { grid-template-columns: 1fr !important; }
    .oc-stats-cell { border-right: 0 !important; }
  }

  /* frames toggle: if off, soften hard ink rules down to line */
  body.frames-off .hardrule { background: var(--line) !important; }
  body.frames-off aside,
  body.frames-off header,
  body.frames-off main > div {
    border-color: var(--line) !important;
  }
</style>

  <script type="text/babel">

/* ===== icons ===== */
// Lucide-style icons, 1.5 stroke, round caps
const ICON_PATHS = {
  home: 'M3 12l9-9 9 9M5 10v10a1 1 0 0 0 1 1h3v-6h6v6h3a1 1 0 0 0 1-1V10',

  metrics: 'M3 18v-5 M9 18v-9 M15 18v-3 M21 18V6 M3 21h18',
  docs: 'M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20 M9 7h6 M9 11h6',
  plus: 'M12 5v14 M5 12h14',
  search: 'M11 19a8 8 0 1 0 0-16 8 8 0 0 0 0 16zM21 21l-4.3-4.3',
  chevron: 'M6 9l6 6 6-6',
  chevronR: 'M9 6l6 6-6 6',
  copy: 'M8 2h10a2 2 0 0 1 2 2v12 M16 6H6a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2z',

  link: 'M10 14a5 5 0 0 0 7 0l3-3a5 5 0 0 0-7-7l-1 1 M14 10a5 5 0 0 0-7 0l-3 3a5 5 0 0 0 7 7l1-1',

function Icon({ n, s = 16, w = 1.5, style }) {
  const d = ICON_PATHS[n];
  if (!d) return null;
  return (
    <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke="currentColor"

// LogoMark inline
function LogoMark({ size = 22 }) {

    <svg width={size} height={size} viewBox="0 0 64 64" role="img" aria-label="OpenClaw">

}

Object.assign(window, { Icon, LogoMark });


/* ===== primitives ===== */
const { useState, useEffect, useRef } = React;

// ---- Primitives for OpenClaw Managed Agents dashboard ----

function Button({ variant = 'secondary', size = 'md', icon, iconRight, children, onClick, style, disabled, className }) {
  const base = {
    display: 'inline-flex', alignItems: 'center', gap: 7,
    fontFamily: 'var(--font-sans)', fontWeight: 500,
    border: '1px solid transparent', borderRadius: 6, cursor: disabled ? 'not-allowed' : 'pointer',
    transition: 'background 120ms var(--ease), color 120ms var(--ease), border-color 120ms var(--ease)',
    letterSpacing: '-0.011em', whiteSpace: 'nowrap',
    opacity: disabled ? 0.5 : 1,
  };
  const sizes = {
    xs: { padding: '3px 8px', fontSize: 11 },
    sm: { padding: '5px 10px', fontSize: 12 },
    md: { padding: '7px 13px', fontSize: 13 },
  };
  const variants = {
    primary: { background: 'var(--accent, var(--lobster))', color: '#fff' },
    hard: { background: 'var(--ink)', color: 'var(--paper)' },
    secondary: { background: 'var(--card)', color: 'var(--ink)', borderColor: 'var(--line-2)' },
    ghost: { background: 'transparent', color: 'var(--ink-2)' },
    danger: { background: 'var(--card)', color: 'var(--danger)', borderColor: 'var(--line-2)' },
  };
  return (
    <button onClick={onClick} disabled={disabled} className={className} style={{ ...base, ...sizes[size], ...variants[variant], ...style }}>
      {icon && <Icon n={icon} s={size === 'xs' ? 11 : size === 'sm' ? 12 : 13} />}
      {children}
      {iconRight && <Icon n={iconRight} s={size === 'xs' ? 11 : size === 'sm' ? 12 : 13} />}
    </button>
  );
}

function Badge({ tone = 'neutral', children, dotOnly, style }) {
  const tones = {
    neutral: { bg: 'transparent', fg: 'var(--ink-2)', border: 'var(--line-2)', dot: 'var(--ink-3)' },
    ink:     { bg: 'var(--ink)', fg: 'var(--paper)', border: 'var(--ink)', dot: 'var(--paper)' },
    live:    { bg: 'var(--ink)', fg: 'var(--paper)', border: 'var(--ink)', dot: 'var(--accent, var(--lobster))' },
    ok:      { bg: 'transparent', fg: 'var(--ok)', border: 'var(--line-2)', dot: 'var(--ok)' },
    warn:    { bg: 'transparent', fg: 'var(--warn)', border: 'var(--line-2)', dot: 'var(--warn)' },
    err:     { bg: 'transparent', fg: 'var(--danger)', border: 'var(--line-2)', dot: 'var(--danger)' },
    soft:    { bg: 'var(--lobster-wash)', fg: 'var(--lobster-press)', border: 'var(--lobster-soft)', dot: 'var(--accent, var(--lobster))' },
  };
  const t = tones[tone];
  return (
    <span style={{
      display: 'inline-flex', alignItems: 'center', gap: 6,
      borderRadius: 9999, padding: dotOnly ? 4 : '2px 9px',
      fontSize: 11, fontWeight: 500,
      fontFamily: 'var(--font-sans)',
      background: t.bg, color: t.fg, border: `1px solid ${t.border}`,
      lineHeight: 1.4, ...style,
    }}>
      <span style={{
        width: 6, height: 6, borderRadius: '50%', background: t.dot,
        boxShadow: tone === 'live' ? '0 0 0 3px color-mix(in srgb, var(--accent, var(--lobster)) 28%, transparent)' : 'none',
        animation: tone === 'live' ? 'oc-pulse 2.4s var(--ease) infinite' : 'none',
      }} />
      {!dotOnly && children}
    </span>
  );
}

const { useState: useStateSessions, useMemo: useMemoSessions } = React;

function StatusBadge({ s }) {
  if (s === 'running') return <Badge tone="live">Running</Badge>;
  if (s === 'awaiting') return <Badge tone="soft">Awaits approval</Badge>;
  if (s === 'idle') return <Badge tone="neutral">Idle</Badge>;
  if (s === 'ended') return <Badge tone="ok">Ended</Badge>;
  if (s === 'failed') return <Badge tone="err">Failed</Badge>;
  if (s === 'quota') return <Badge tone="warn">Quota hit</Badge>;
  return <Badge tone="neutral">{s}</Badge>;
}

// Meter bar — the "cost / quota" visual. Editorial: just a hairline track.
function Meter({ value, cap, unit = '', tone = 'ink', style }) {
  const pct = Math.min(100, (value / cap) * 100);
  const hot = pct > 92;
  const color = hot ? 'var(--danger)' : tone === 'ink' ? 'var(--ink)' : 'var(--accent, var(--lobster))';
  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap: 4, ...style }}>
      <div style={{ height: 2, background: 'var(--line)', position: 'relative', overflow: 'hidden' }}>
        <div style={{
          position: 'absolute', left: 0, top: 0, height: '100%',
          width: pct + '%', background: color,
          transition: 'width 240ms var(--ease)',
        }} />
      </div>
    </div>
  );
}

const { useState: useStateDetail, useEffect: useEffectDetail, useRef: useRefDetail } = React;

// Event row — this is the hero of the whole design.
function EventRow({ e, streaming }) {
  const kindTone = {
    'session.status_running':  { tag: 'status', c: 'var(--ink-3)' },
    'user.message':            { tag: 'user',   c: 'var(--ink)' },
    'agent.thinking':          { tag: 'think',  c: 'var(--ink-3)' },
    'agent.message':           { tag: 'reply',  c: 'var(--ink)' },
    'agent.tool_use':          { tag: 'tool·use', c: 'var(--ink-2)' },
    'agent.tool_result':       { tag: 'tool·ok',  c: 'var(--ok)' },
    'agent.tool_confirmation_request': { tag: 'approve?', c: 'var(--lobster-press)' },
  };
  const k = kindTone[e.type] || { tag: e.type, c: 'var(--ink-3)' };

  // Shared row shell: mono timestamp + type tag + content
  const Row = ({ children, approveRow }) => (
    <div style={{
      display: 'grid',
      gridTemplateColumns: '92px 92px 1fr',
      gap: 16,
      padding: '12px 24px',
      borderBottom: '1px solid var(--line)',
      background: approveRow ? 'var(--lobster-wash)' : 'transparent',
      borderLeft: approveRow ? '2px solid var(--accent, var(--lobster))' : '2px solid transparent',
    }}>
      <Mono s={11} c="var(--ink-3)">{e.t}</Mono>
      <div>
        <Mono s={11} c={k.c} style={{ textTransform: 'lowercase' }}>{k.tag}</Mono>
        {e.actor && (
          <div style={{ marginTop: 2 }}>
            <Mono s={10} c="var(--ink-4)">{e.actor}</Mono>
          </div>
        )}
      </div>
      <div>{children}</div>
    </div>
  );

  if (e.type === 'session.status_running') {
    return <Row><span style={{ fontSize: 12, color: 'var(--ink-3)' }}>Container <code>oc-sx-a91c8b42</code> attached · warm-pool reuse · 4.1s boot</span></Row>;
  }
  if (e.type === 'user.message') {
    return <Row>
      <p style={{ margin: 0, fontSize: 14, color: 'var(--ink)', lineHeight: 1.55, maxWidth: '62ch' }}>{e.text}</p>
    </Row>;
  }
  if (e.type === 'agent.thinking') {
    return <Row>
      <div style={{
        borderLeft: '1px solid var(--line-2)', paddingLeft: 12,
        fontSize: 13, color: 'var(--ink-3)', fontStyle: 'italic',
        lineHeight: 1.55, maxWidth: '62ch',
      }}>{e.text}</div>
    </Row>;
  }
  if (e.type === 'agent.tool_use') {
    return <Row>
      <div style={{
        border: '1px solid var(--line-2)', borderRadius: 6,
        padding: '8px 10px', background: 'var(--card)',
        display: 'grid', gridTemplateColumns: 'auto 1fr auto', gap: 10,
        alignItems: 'center',
      }}>
        <span style={{
          width: 20, height: 20, borderRadius: 4,
          background: 'var(--ink)', color: 'var(--paper)',
          display: 'grid', placeItems: 'center',
        }}>
          <Icon n="terminal" s={11} />
        </span>
        <div>
          <Mono s={12} c="var(--ink)" style={{ fontWeight: 500 }}>{e.tool}</Mono>
          <Mono s={10} c="var(--ink-3)" style={{ marginLeft: 8 }}>{e.toolUseId}</Mono>
          <div style={{ marginTop: 2, fontFamily: 'var(--font-mono)', fontSize: 11, color: 'var(--ink-2)' }}>
            {JSON.stringify(e.args)}
          </div>
        </div>
        {e.needsApproval && <Badge tone="soft">pending</Badge>}
      </div>
    </Row>;
  }
  if (e.type === 'agent.tool_result') {
    return <Row>
      <div style={{
        display: 'flex', alignItems: 'center', gap: 10,
        padding: '6px 10px', border: '1px solid var(--line)', borderRadius: 6,
        background: 'var(--paper-2)',
      }}>
        <Icon n="check" s={12} style={{ color: 'var(--ok)' }} />
        <Mono s={11} c="var(--ink-3)">{e.toolUseId}</Mono>
        <span style={{ fontSize: 12, color: 'var(--ink-2)' }}>{e.summary}</span>
      </div>
    </Row>;
  }
  if (e.type === 'agent.tool_confirmation_request') {
    return <ApprovalRow e={e} />;
  }
  return <Row>{e.type}</Row>;
}

function SessionDetail({ sessionId, sessionState, streamLen }) {
  const s = SESSIONS.find(x => x.id === sessionId) || SESSIONS[0];
  const scrollRef = useRefDetail(null);
  useEffectDetail(() => {
    if (scrollRef.current) scrollRef.current.scrollTop = scrollRef.current.scrollHeight;
  }, [streamLen]);

  // Derive displayed events + streaming based on state tweak
  const effectiveStatus = sessionState || s.status;
  const events = effectiveStatus === 'awaiting'
    ? EVENTS                               // stops at confirmation request
    : effectiveStatus === 'quota'
      ? EVENTS.slice(0, 3)
      : effectiveStatus === 'failed'
        ? EVENTS.slice(0, 2)
        : EVENTS.slice(0, 7);              // running: up to tool_result

  const showStream = effectiveStatus === 'running';
  const partial = STREAMING_TOKENS.slice(0, streamLen || STREAMING_TOKENS.length);

  return (
    <div style={{ flex: 1, display: 'flex', flexDirection: 'column', height: '100%', background: 'var(--paper)', overflow: 'hidden' }}>
      {/* Session header */}
      <div style={{ padding: '18px 24px 14px', borderBottom: '1px solid var(--ink)' }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
          <Mono s={13} c="var(--ink)" style={{ fontWeight: 500 }}>{s.id}</Mono>
          <Icon n="copy" s={11} style={{ color: 'var(--ink-3)', cursor: 'pointer' }} />
          <Mono s={11} c="var(--ink-3)" style={{ marginLeft: 6 }}>· {s.agent} v{4} · {s.model}</Mono>
          <div style={{ marginLeft: 'auto', display: 'flex', gap: 8, alignItems: 'center' }}>
            <StatusBadge s={effectiveStatus} />
            <SessionHeaderActions sid={s.id} status={effectiveStatus} />
            <Button variant="ghost" size="sm" icon="external">Open JSONL</Button>
          </div>
        </div>
        <div style={{ display: 'flex', gap: 20, marginTop: 14 }}>
          <Stat label="Turns"  value={String(s.turns)} />
          <Stat label="Wall"   value={formatWall(s.wallMs)} />
          <Stat label="Tokens" value={(s.tokens/1000).toFixed(1)+'k'} meter={{v: s.tokens, cap: s.tokensCap, suffix: '/ 50k'}} />
          <Stat label="Cost"   value={'$'+s.cost.toFixed(3)} meter={{v: s.cost, cap: s.costCap, suffix: '/ $'+s.costCap.toFixed(2)}} hot={effectiveStatus==='quota'} />
          <Stat label="Container" value={s.container} mono sub={`boot ${(s.bootMs/1000).toFixed(1)}s · ${s.pool}`} />
        </div>
      </div>

      {/* Events + Inspector split */}
      <div className="oc-session-split" style={{ flex: 1, display: 'grid', gridTemplateColumns: '1fr 320px', minHeight: 0 }}>
        {/* Event stream */}
        <div style={{ display: 'flex', flexDirection: 'column', minHeight: 0, borderRight: '1px solid var(--line)' }}>
          <div style={{
            padding: '10px 24px', display: 'flex', alignItems: 'center', gap: 12,
            borderBottom: '1px solid var(--line)', background: 'var(--paper)',
          }}>
            <Eyebrow>Events · SSE</Eyebrow>
            <Mono s={10} c="var(--ink-3)">GET /v1/sessions/{s.id}/events?stream=true</Mono>
            <div style={{ marginLeft: 'auto', display: 'flex', gap: 10 }}>
              {showStream && <>
                <span style={{
                  width: 5, height: 5, borderRadius: '50%',
                  background: 'var(--accent, var(--lobster))',
                  boxShadow: '0 0 0 3px color-mix(in srgb, var(--accent, var(--lobster)) 22%, transparent)',
                  alignSelf: 'center',
                  animation: 'oc-pulse 2s var(--ease) infinite',
                }} />
                <Mono s={10} c="var(--ink-3)">tail · 42 tok/s</Mono>
              </>}
              {!showStream && <Mono s={10} c="var(--ink-3)">paused</Mono>}
            </div>
          </div>
          <div ref={scrollRef} style={{ flex: 1, overflowY: 'auto' }}>
            {events.map((e, i) => <EventRow key={i} e={e} />)}
            {showStream && <StreamingRow text={partial} />}
            <SentMessagesFeed sid={s.id} />
            <CancelledBanner />
            {effectiveStatus === 'quota' && (
              <div style={{ padding: '24px', borderBottom: '1px solid var(--line)' }}>
                <Badge tone="warn">HTTP 429 · quota_exceeded</Badge>
                <p style={{ marginTop: 12, fontSize: 13, color: 'var(--ink)', maxWidth: '58ch', lineHeight: 1.55 }}>
                  Session refused further turns. <code>maxCostUsdPerSession</code> reached: $0.982 of $1.000. Open a new session on the same agent to continue, or bump the cap and retry.
                </p>
                <div style={{ display: 'flex', gap: 8, marginTop: 12 }}>
                  <Button variant="hard" size="sm">Raise cap to $2.00</Button>
                  <Button variant="secondary" size="sm">Open new session</Button>
                </div>
              </div>
            )}
            {effectiveStatus === 'failed' && (
              <div style={{ padding: '24px', borderBottom: '1px solid var(--line)' }}>
                <Badge tone="err">session.failed</Badge>
                <p style={{ marginTop: 12, fontSize: 13, color: 'var(--ink)', maxWidth: '58ch', lineHeight: 1.55 }}>
                  {s.error || 'Container failed to boot.'}

              </div>
            )}
          </div>

          <Composer sid={s.id} effectiveStatus={effectiveStatus} />
        </div>

        {/* Inspector */}
        <SessionInspector s={s} status={effectiveStatus} />
      </div>
    </div>
  );
}

function formatWall(ms) {
  const s = Math.floor(ms/1000);
  if (s < 60) return s+'s';
  const m = Math.floor(s/60);
  if (m < 60) return m+'m '+(s%60)+'s';
  const h = Math.floor(m/60);
  return h+'h '+(m%60)+'m';
}

/* ===== write operations: context, mutations, toasts, modals ===== */

const AppCtx = React.createContext(null);
const useApp = () => React.useContext(AppCtx);

function AppProvider({ children }) {
  const [sentMessages, setSentMessages] = useState([]);
  const [approval, setApproval] = useState({ status: 'pending' });
  const [alwaysAllow, setAlwaysAllow] = useState({});
  const [cancelState, setCancelState] = useState(null);
  const [toasts, setToasts] = useState([]);
  const [createOpen, setCreateOpen] = useState(false);
  const [agents, setAgents] = useState(() => (typeof AGENTS !== 'undefined' ? AGENTS : []));

  const latency = () => 14 + Math.floor(Math.random() * 32);

  const pushToast = React.useCallback((t) => {
    const id = 't_' + Math.random().toString(36).slice(2, 10);
    setToasts(ts => [...ts, { id, createdAt: Date.now(), ...t }]);
    setTimeout(() => setToasts(ts => ts.filter(x => x.id !== id)), 4800);
    return id;
  }, []);
  const dismissToast = (id) => setToasts(ts => ts.filter(x => x.id !== id));

  function sendMessage(sid, text) {
    if (!text.trim()) return;
    const id = 'ev_' + Math.random().toString(36).slice(2, 10);
    const ms = latency();
    setSentMessages(m => [...m, { id, sid, text: text.trim(), at: new Date(), status: 'sending' }]);
    const tid = pushToast({
      method: 'POST', path: `/v1/sessions/${sid}/events`,
      label: 'user.message', status: 202, ms: null, pending: true,
    });
    setTimeout(() => {
      setSentMessages(m => m.map(x => x.id === id ? { ...x, status: 'queued', ms } : x));
      setToasts(ts2 => ts2.map(x => x.id === tid ? { ...x, status: 202, ms, pending: false } : x));
    }, ms + 60);
    setTimeout(() => {
      setSentMessages(m => m.map(x => x.id === id ? {
        ...x, status: 'acked',
        ackNote: 'Queued · will open a new turn when the current one resolves',
      } : x));
    }, ms + 900);
  }

  function cancelSession(sid) {
    if (cancelState) return;
    setCancelState('cancelling');
    const ms = latency();
    const tid = pushToast({
      method: 'POST', path: `/v1/sessions/${sid}/cancel`,
      label: 'session.cancel', status: 202, ms: null, pending: true,
    });
    setTimeout(() => {
      setToasts(ts => ts.map(x => x.id === tid ? { ...x, status: 202, ms, pending: false } : x));
    }, ms + 50);
    setTimeout(() => {
      setCancelState('cancelled');
      pushToast({
        method: 'event', path: 'session.cancelled',
        label: `${sid} · container kill ok`, status: 200, ms: 612,
      });
    }, 1200);
  }

  function restartSession(sid) {
    setCancelState(null);
    setApproval({ status: 'pending' });
    setSentMessages([]);
    pushToast({
      method: 'POST', path: `/v1/sessions`,
      label: `re-opened · clone of ${sid}`, status: 201, ms: latency(),
    });
  }

  function resolveApproval(sid, decision) {
    if (approval.status !== 'pending') return;
    setApproval({ status: decision, at: Date.now() });
    pushToast({
      method: 'POST', path: `/v1/sessions/${sid}/events`,
      label: `user.tool_confirmation · ${decision}`, status: 200, ms: latency(),
    });
  }

  function toggleAlwaysAllow(tool) {
    setAlwaysAllow(a => {
      const next = { ...a, [tool]: !a[tool] };
      pushToast({
        method: 'PATCH', path: `/v1/agents/ag_7k2fLq`,
        label: `policy.always_allow[${tool}] = ${!a[tool]}`, status: 200, ms: latency(),
      });
      return next;
    });
  }

  function createAgent(cfg) {
    const id = 'ag_' + Math.random().toString(36).slice(2, 9);
    const newAgent = {
      id, name: cfg.name, model: cfg.model, version: 1,
      tools: cfg.tools, mcp: cfg.mcp, policy: cfg.policy,
      sessions: 0, cost24h: '$0.00', updated: 'just now', isNew: true,
    };
    setAgents(a => [newAgent, ...a]);
    setCreateOpen(false);
    pushToast({
      method: 'POST', path: '/v1/agents',
      label: `${cfg.name} · ${id}`, status: 201, ms: latency(),
    });
  }

  const value = {
    sentMessages, sendMessage,
    approval, resolveApproval,
    alwaysAllow, toggleAlwaysAllow,
    cancelState, cancelSession, restartSession,
    toasts, pushToast, dismissToast,
    createOpen, setCreateOpen,
    agents, createAgent,
  };
  return <AppCtx.Provider value={value}>{children}</AppCtx.Provider>;
}


function Toaster() {
  const ctx = useApp();
  if (!ctx) return null;
  return (
    <div style={{
      position: 'fixed', right: 16, top: 64, zIndex: 200,

    }}>

                <span style={{ fontFamily: 'var(--font-mono)', fontSize: 10, color: 'var(--ink-3)' }}>{t.ms}ms</span>
              )}
              <button onClick={() => ctx.dismissToast(t.id)} style={{

function Composer({ sid, effectiveStatus }) {
  const ctx = useApp();
  const [text, setText] = useState('');
  const [focused, setFocused] = useState(false);
  const taRef = React.useRef(null);

  const disabled = effectiveStatus === 'failed' || ctx?.cancelState === 'cancelled';
  const hint =
    ctx?.cancelState === 'cancelled' ? 'Session ended — open a new one to continue.' :
    effectiveStatus === 'running' ? 'Session is running — your next message will queue.' :
    effectiveStatus === 'awaiting' ? 'Paused on tool approval — resolve above to continue.' :
    effectiveStatus === 'failed' ? 'Session failed — inspect the error above.' :
    'Send a message to open a new turn…';

  function doSend() {
    if (!text.trim() || disabled) return;
    ctx.sendMessage(sid, text);
    setText('');
  }

  function onKeyDown(e) {
    if (e.key === 'Enter' && (e.metaKey || e.ctrlKey)) {
      e.preventDefault(); doSend();
    }
  }

  useEffect(() => {
    const ta = taRef.current;
    if (!ta) return;
    ta.style.height = 'auto';
    ta.style.height = Math.min(ta.scrollHeight, 140) + 'px';
  }, [text]);

  const canSend = text.trim().length > 0 && !disabled;

  return (
    <div style={{ padding: '14px 24px 18px', borderTop: '1px solid var(--ink)' }}>
      <div style={{
        border: '1px solid var(--line-2)',
        background: 'var(--card)', padding: '10px 12px',
        display: 'flex', alignItems: 'flex-end', gap: 10,
        borderRadius: 6,
        transition: 'border-color 120ms var(--ease), opacity 120ms var(--ease)',
        opacity: disabled ? 0.55 : 1,
      }}>
        <div style={{ flex: 1, minWidth: 0 }}>
          <textarea
            ref={taRef} value={text}
            onChange={e => setText(e.target.value)}
            onFocus={() => setFocused(true)}
            onBlur={() => setFocused(false)}
            onKeyDown={onKeyDown}
            placeholder={hint} disabled={disabled} rows={1}
            style={{
              width: '100%', boxSizing: 'border-box',
              border: 0, outline: 'none', boxShadow: 'none', resize: 'none',
              background: 'transparent', color: 'var(--ink)',
              fontFamily: 'var(--font-sans)', fontSize: 14, lineHeight: 1.5,
              padding: '4px 2px 8px', minHeight: 24,
              accentColor: 'var(--ink-2)',
            }}
          />
          <div style={{ display: 'flex', gap: 6, paddingTop: 6, borderTop: '1px solid var(--line)', alignItems: 'center', flexWrap: 'wrap' }}>
            <span style={{ fontFamily: 'var(--font-mono)', fontSize: 10, color: 'var(--ink-3)', background: 'var(--paper-2)', padding: '1px 5px', borderRadius: 3 }}>moonshot/kimi-k2.5</span>
            <span style={{ fontFamily: 'var(--font-mono)', fontSize: 10, color: 'var(--ink-3)', background: 'var(--paper-2)', padding: '1px 5px', borderRadius: 3 }}>/think medium</span>
            <span style={{ marginLeft: 'auto', display: 'flex', alignItems: 'center', gap: 8 }}>
              {text.length > 0 && <span style={{ fontFamily: 'var(--font-mono)', fontSize: 10, color: 'var(--ink-3)' }}>{text.length} chars</span>}
              <span style={{ fontFamily: 'var(--font-mono)', fontSize: 10, color: 'var(--ink-3)' }}>POST /events · <Kbd>⌘↵</Kbd></span>
            </span>
          </div>
        </div>
        <button onClick={doSend} disabled={!canSend} aria-label="Send" style={{
          width: 30, height: 30, borderRadius: 6,
          background: canSend ? 'var(--ink)' : 'var(--paper-3)',
          border: 0, color: canSend ? 'var(--paper)' : 'var(--ink-4)',
          display: 'grid', placeItems: 'center',
          cursor: canSend ? 'pointer' : 'not-allowed',
          transition: 'background 120ms var(--ease)',
          fontSize: 13, fontFamily: 'var(--font-sans)',
        }}>↵</button>
      </div>
    </div>
  );
}


function SentMessagesFeed({ sid }) {
  const ctx = useApp();
  const mine = ctx?.sentMessages.filter(m => m.sid === sid) || [];
  if (!mine.length) return null;
  const baseTs = 7;
  return <>
    {mine.map((m, i) => {
      const t = `+00:${String(baseTs + i * 3).padStart(5, '0')}.${String(i * 117 % 1000).padStart(3, '0')}`;
      return (
        <div key={m.id} style={{
          display: 'grid', gridTemplateColumns: '92px 92px 1fr',
          gap: 16, padding: '12px 24px', borderBottom: '1px solid var(--line)',
          background: 'var(--paper-2)',
        }}>
          <span style={{ fontFamily: 'var(--font-mono)', fontSize: 11, color: 'var(--ink-3)' }}>{t}</span>
          <div>
            <span style={{ fontFamily: 'var(--font-mono)', fontSize: 11, color: 'var(--ink)', fontWeight: 500 }}>user.message</span>
            <div style={{ marginTop: 2, fontFamily: 'var(--font-mono)', fontSize: 10, color: m.status === 'sending' ? 'var(--ink-4)' : 'var(--ok)' }}>
              {m.status === 'sending' ? 'POST…' :
               m.status === 'queued'  ? `202 · ${m.ms}ms` :
               m.status === 'acked'   ? 'queued' : m.status}
            </div>
          </div>
          <div>
            <p style={{ margin: 0, fontSize: 14, color: 'var(--ink)', lineHeight: 1.55, maxWidth: '62ch', whiteSpace: 'pre-wrap' }}>{m.text}</p>
            {m.ackNote && (
              <span style={{ marginTop: 6, display: 'block', fontFamily: 'var(--font-mono)', fontSize: 10, color: 'var(--ink-3)' }}>{m.ackNote}</span>
            )}
          </div>
        </div>
      );
    })}
  </>;
}

function SessionHeaderActions({ sid, status }) {
  const ctx = useApp();
  const cancelled = ctx?.cancelState === 'cancelled';
  const cancelling = ctx?.cancelState === 'cancelling';
  if (cancelled) {
    return <Button variant="secondary" size="sm" icon="plus" onClick={() => ctx.restartSession(sid)}>New session</Button>;
  }
  if (cancelling) {
    return <Button variant="secondary" size="sm" disabled>Cancelling…</Button>;
  }
  if (status === 'running') {
    return <Button variant="secondary" size="sm" icon="pause" onClick={() => ctx.cancelSession(sid)}>Cancel</Button>;
  }
  if (status === 'awaiting') {
    return (
      <>
        <Button variant="primary" size="sm" icon="check" onClick={() => {
          const el = document.querySelector('[data-approve-scroll]');
          if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }}>Review approval</Button>
        <Button variant="secondary" size="sm" icon="pause" onClick={() => ctx.cancelSession(sid)}>Cancel</Button>
      </>
    );
  }
  return null;
}

function NewAgentButton() {
  const ctx = useApp();
  return <Button variant="hard" size="md" icon="plus" onClick={() => ctx?.setCreateOpen(true)}>New agent</Button>;
}

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "density": "compact",
  "sessionState": "running",
  "accent": "lobster",
  "frames": true,
  "layout": "split"
}/*EDITMODE-END*/;

const ACCENTS = {
  lobster: '#FF4D14',
  warm:    '#E85A2F',
  ink:     '#141413',
};

function App() {
  const [route, setRoute] = useState(() => {
    try { return JSON.parse(localStorage.getItem('oc_route')) || { view: 'sessions' }; } catch { return { view: 'sessions' }; }
  });
  const [selectedSession, setSelectedSession] = useState(() => localStorage.getItem('oc_sess') || 'sx_a91c8b42');
  const [filter, setFilter] = useState('all');
  const [showTweaks, setShowTweaks] = useState(false);
  const [tweaks, setTweaks] = useState(() => {
    try {
      const v = localStorage.getItem('oc_tweaks');
      return v ? { ...TWEAK_DEFAULTS, ...JSON.parse(v) } : { ...TWEAK_DEFAULTS };
    } catch { return { ...TWEAK_DEFAULTS }; }
  });

  useEffect(() => {
    function onMsg(e) {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setShowTweaks(true);
      else if (t === '__deactivate_edit_mode') setShowTweaks(false);
    }
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  useEffect(() => { localStorage.setItem('oc_route', JSON.stringify(route)); }, [route]);
  useEffect(() => { localStorage.setItem('oc_sess', selectedSession); }, [selectedSession]);
  useEffect(() => { localStorage.setItem('oc_tweaks', JSON.stringify(tweaks)); }, [tweaks]);

  useEffect(() => {
    document.body.classList.toggle('density-compact', tweaks.density === 'compact');
    document.body.classList.toggle('density-comfy',   tweaks.density === 'comfy');
    document.body.classList.toggle('frames-off', !tweaks.frames);
    document.documentElement.style.setProperty('--accent', ACCENTS[tweaks.accent] || ACCENTS.lobster);
  }, [tweaks]);

  function updateTweaks(next) {
    setTweaks(next);
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: next }, '*');
  }

  const [streamLen, setStreamLen] = useState(0);
  useEffect(() => {
    const id = setInterval(() => {
      setStreamLen(n => {
        const max = STREAMING_TOKENS.length;
        if (n >= max) return 12;
        return Math.min(max, n + 2);
      });
    }, 80);
    return () => clearInterval(id);
  }, []);

  useEffect(() => {
    function onKey(e) {
      if (e.key === 't' && !e.metaKey && !e.ctrlKey && !e.altKey &&
          !['INPUT','TEXTAREA'].includes(document.activeElement?.tagName)) {
        setShowTweaks(s => !s);
      }
    }
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, []);

  const view = route.view;
  const content = view === 'overview' ? <OverviewView />
    : view === 'agents' ? <AgentsView />
    : view === 'environments' ? <EnvironmentsView />
    : view === 'audit' ? <AuditView />
    : view === 'vaults' ? <PlaceholderView title="Vaults" sub="Per-end-user credential bundles · not shown in this mockup" />
    : view === 'metrics' ? <PlaceholderView title="Metrics" sub="Prometheus · /metrics · not shown in this mockup" />
    : (
      <div style={{ flex: 1, display: 'flex', minHeight: 0 }} data-screen-label="Sessions split">
        <SessionsList selectedId={selectedSession} onSelect={setSelectedSession} filter={filter} setFilter={setFilter} />
        <SessionDetail sessionId={selectedSession} sessionState={tweaks.sessionState} streamLen={streamLen} />
      </div>
    );

  return (
    <div style={{ display: 'flex', flexDirection: 'column', height: '100vh', width: '100vw', background: 'var(--paper)', overflow: 'hidden' }}>
      <Topbar route={route} setRoute={setRoute} onTweaks={() => setShowTweaks(s => !s)} />
      <div style={{ flex: 1, display: 'flex', minHeight: 0 }}>
        <Sidebar route={route} setRoute={setRoute} />
        <main style={{ flex: 1, display: 'flex', flexDirection: 'column', minWidth: 0, background: 'var(--paper)' }} data-screen-label={'View ' + view}>
          {content}
        </main>
      </div>
      {showTweaks && (<TweaksPanel tweaks={tweaks} setTweaks={updateTweaks} onClose={() => setShowTweaks(false)} />)}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(
  <AppProvider>
    <App />
    <Toaster />
    <CreateAgentModal />
  </AppProvider>
);
</script>
</body>
</html>
