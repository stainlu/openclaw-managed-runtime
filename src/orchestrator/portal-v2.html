<!doctype html>

<title>OpenClaw · Managed Agents</title>
<style>
/* ============================================================
   OpenClaw Design System — Tokens + Semantic Classes
   Modern, editorial, Are.na-adjacent: monochrome paper, sans only,
   lobster orange used with extreme restraint.
   ============================================================ */

@import url("https://fonts.googleapis.com/css2?family=Inter:wght@400;450;500;600&family=JetBrains+Mono:wght@400;500&display=swap");

:root {
  /* ---------- Canvas & surfaces ---------- */
  --paper: #f5f4f0;          /* warm off-white canvas (Are.na-adjacent) */
  --paper-2: #eceae4;        /* hover on paper */
  --paper-3: #e3e0d8;        /* pressed */
  --card: #ffffff;           /* card fill */
  --scrim: rgba(20, 20, 19, 0.32);
  --chrome: rgba(245, 244, 240, 0.78);

  /* ---------- Ink ---------- */
  --ink: #141413;            /* primary text */
  --ink-2: #4a4843;          /* secondary */
  --ink-3: #817d74;          /* tertiary / labels */
  --ink-4: #b5b0a5;          /* disabled */
  --ink-inv: #f5f4f0;        /* on dark */

  /* ---------- Lines ---------- */
  --line: #e3e0d8;
  --line-2: #c9c4b7;
  --line-3: #141413;         /* hard line for editorial frames */

  /* ---------- Lobster — the single accent, used RARELY ---------- */
  --lobster: #ff4d14;
  --lobster-hover: #e64411;
  --lobster-press: #c23709;
  --lobster-soft: #ffe5da;
  --lobster-wash: #fff3ed;
  --lobster-ring: rgba(255, 77, 20, 0.32);

  /* ---------- Semantic ---------- */
  --ok: #2f7a4e;
  --warn: #a67318;
  --danger: #c23709;
  --info: #3a5fa8;

  /* ---------- Typography ---------- */
  --font-sans: "Inter", -apple-system, BlinkMacSystemFont, "Helvetica Neue", Helvetica, Arial, system-ui, sans-serif;
  --font-mono: "JetBrains Mono", ui-monospace, "SF Mono", Menlo, Consolas, monospace;

  --text-xs: 0.6875rem;   /* 11 */
  --text-sm: 0.8125rem;   /* 13 */
  --text-base: 0.9375rem; /* 15 */
  --text-md: 1.0625rem;   /* 17 */
  --text-lg: 1.375rem;    /* 22 */
  --text-xl: 1.875rem;    /* 30 */
  --text-2xl: 2.625rem;   /* 42 */
  --text-3xl: 4rem;       /* 64 */
  --text-4xl: 6rem;       /* 96 */

  --lh-tight: 1.05;
  --lh-snug: 1.25;
  --lh-normal: 1.5;

  --track-display: -0.035em;
  --track-body: -0.011em;
  --track-caps: 0.02em;

  /* ---------- Spacing ---------- */
  --s-1: 4px;
  --s-2: 8px;
  --s-3: 12px;
  --s-4: 16px;
  --s-6: 24px;
  --s-8: 32px;
  --s-12: 48px;
  --s-16: 64px;
  --s-24: 96px;
  --s-32: 128px;

  /* ---------- Radii — deliberately small ---------- */
  --r-xs: 2px;
  --r-sm: 4px;
  --r-md: 6px;
  --r-lg: 8px;
  --r-full: 9999px;

  /* ---------- Shadows — almost never ---------- */
  --shadow-1: 0 1px 0 rgba(20, 20, 19, 0.04);
  --shadow-2: 0 4px 16px rgba(20, 20, 19, 0.06);
  --shadow-3: 0 20px 40px rgba(20, 20, 19, 0.10);

  /* ---------- Motion ---------- */
  --d-instant: 120ms;
  --d-fast: 200ms;
  --d-med: 360ms;
  --ease: cubic-bezier(0.2, 0.7, 0.2, 1);

  --focus-ring: 0 0 0 2px var(--paper), 0 0 0 4px var(--lobster-ring);
}

/* ============================================================
   Base
   ============================================================ */

*, *::before, *::after { box-sizing: border-box; }

html, body { margin: 0; padding: 0; }

body {
  font-family: var(--font-sans);
  font-size: var(--text-sm);
  line-height: var(--lh-normal);
  letter-spacing: var(--track-body);
  color: var(--ink);
  background: var(--paper);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  font-feature-settings: "ss01", "cv11";
}

/* ============================================================
   Editorial type scale — ALL sans, Inter tight tracking,
   weights used sparingly (400/500 are the system; 600 is rare)
   ============================================================ */

.display-xl, h1.display {
  font-family: var(--font-sans);
  font-weight: 500;
  font-size: var(--text-4xl);
  line-height: var(--lh-tight);
  letter-spacing: -0.045em;
  color: var(--ink);
  margin: 0;
}

.display-lg {
  font-family: var(--font-sans);
  font-weight: 500;
  font-size: var(--text-3xl);
  line-height: var(--lh-tight);
  letter-spacing: -0.04em;
  color: var(--ink);
  margin: 0;
}

h1, .h1 {
  font-family: var(--font-sans);
  font-weight: 500;
  font-size: var(--text-2xl);
  line-height: var(--lh-tight);
  letter-spacing: var(--track-display);
  color: var(--ink);
  margin: 0;
}

h2, .h2 {
  font-family: var(--font-sans);
  font-weight: 500;
  font-size: var(--text-xl);
  line-height: 1.15;
  letter-spacing: -0.03em;
  color: var(--ink);
  margin: 0;
}

h3, .h3 {
  font-family: var(--font-sans);
  font-weight: 500;
  font-size: var(--text-lg);
  line-height: var(--lh-snug);
  letter-spacing: -0.022em;
  color: var(--ink);
  margin: 0;
}

h4, .h4 {
  font-family: var(--font-sans);
  font-weight: 500;
  font-size: var(--text-md);
  line-height: var(--lh-snug);
  letter-spacing: -0.018em;
  color: var(--ink);
  margin: 0;
}

p, .body {
  font-family: var(--font-sans);
  font-weight: 400;
  font-size: var(--text-sm);
  line-height: var(--lh-normal);
  color: var(--ink-2);
  margin: 0;
}

.body-lg {
  font-size: var(--text-base);
  line-height: 1.55;
}

.lede {
  font-family: var(--font-sans);
  font-weight: 400;
  font-size: var(--text-md);
  line-height: 1.5;
  letter-spacing: -0.015em;
  color: var(--ink-2);
}

.eyebrow, .label {
  font-family: var(--font-mono);
  font-weight: 400;
  font-size: var(--text-xs);
  letter-spacing: var(--track-caps);
  text-transform: uppercase;
  color: var(--ink-3);
}

.caption {
  font-family: var(--font-sans);
  font-weight: 400;
  font-size: var(--text-xs);
  line-height: 1.35;
  color: var(--ink-3);
}

code, .code, kbd {
  font-family: var(--font-mono);
  font-size: 0.92em;
  background: var(--paper-2);
  padding: 1px 5px;
  border-radius: var(--r-xs);
  color: var(--ink);
}

pre {
  font-family: var(--font-mono);
  font-size: var(--text-sm);
  line-height: 1.55;
  background: var(--paper-2);
  border: 1px solid var(--line);
  border-radius: var(--r-md);
  padding: var(--s-4);
  overflow-x: auto;
  margin: 0;
}

pre code { background: transparent; padding: 0; }

a {
  color: var(--ink);
  text-decoration: underline;
  text-underline-offset: 3px;
  text-decoration-thickness: 1px;
  text-decoration-color: var(--ink-3);
  transition: text-decoration-color var(--d-instant) var(--ease), color var(--d-instant) var(--ease);
}
a:hover { text-decoration-color: var(--lobster); color: var(--lobster-press); }

hr { border: 0; border-top: 1px solid var(--line); margin: var(--s-6) 0; }

::selection { background: var(--lobster-soft); color: var(--ink); }

:focus-visible {
  outline: none;
  box-shadow: var(--focus-ring);
  border-radius: var(--r-sm);
}

@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    transition-duration: 0.01ms !important;
  }
}

</style>
<style>
  html, body, #root { height: 100%; margin: 0; padding: 0; }
  body {
    background: var(--paper);
    overflow: hidden;
    font-feature-settings: "ss01", "cv11";
  }
  code { font-family: var(--font-mono); font-size: 0.92em; background: var(--paper-2); padding: 1px 5px; border-radius: 2px; color: var(--ink); }
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-thumb { background: var(--line-2); border-radius: 9999px; border: 3px solid var(--paper); }
  ::-webkit-scrollbar-thumb:hover { background: var(--ink-3); }
  ::-webkit-scrollbar-track { background: transparent; }

  @keyframes oc-blink { 0%, 49% { opacity: 1 } 50%, 100% { opacity: 0 } }
  @keyframes oc-pulse { 0%, 100% { opacity: 1 } 50% { opacity: 0.45 } }
  @keyframes oc-toast-in { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes oc-fade-in { from { opacity: 0; } to { opacity: 1; } }

  /* density modes */
  body.density-comfy { font-size: 15px; }
  body.density-compact { font-size: 13px; }

  /* ============================================================
     Responsive — progressively collapse topbar chrome.
     The dashboard is designed for ~1440px but must stay usable
     from ~980px up through ultrawide.
     ============================================================ */

  /* < 1400px: hide the noisy commit/tests strip */
  @media (max-width: 1399px) {
    .oc-commit { display: none !important; }
  }
  /* < 1240px: hide the "deployment_" prefix — the id carries the meaning */
  @media (max-width: 1239px) {
    .oc-deployment-prefix { display: none !important; }
    .oc-search { width: 200px !important; }
  }
  /* < 1120px: hide the "Managed Agents" sublabel on the wordmark */
  @media (max-width: 1119px) {
    .oc-brand-sub { display: none !important; }
    .oc-btn-docs { display: none !important; }
  }
  /* < 1000px: collapse search to a 28x28 icon button */
  @media (max-width: 999px) {
    .oc-search { display: none !important; }
    .oc-search-compact { display: grid !important; }
  }
  /* < 900px: drop the deployment breadcrumb entirely */
  @media (max-width: 899px) {
    .oc-topbar-mid { display: none !important; }
    .oc-topbar { grid-template-columns: 240px auto !important; }
  }
  /* < 760px: collapse sidebar to icon rail */
  @media (max-width: 759px) {
    .oc-sidebar { width: 56px !important; }
    .oc-sidebar-label, .oc-sidebar-eyebrow, .oc-sidebar-deploy, .oc-sidebar-footer-text, .oc-sidebar-count { display: none !important; }
    .oc-sidebar-item { justify-content: center !important; padding: 8px !important; }
    .oc-topbar { grid-template-columns: 56px auto !important; }
    .oc-brand-wrap { padding: 0 10px !important; }
  }

  /* Session split: drop the inspector pane below 1200px */
  @media (max-width: 1199px) {
    .oc-session-split { grid-template-columns: 1fr !important; }
    .oc-session-inspector { display: none !important; }
  }
  /* Narrow the session list below 1100px, drop it below 860px (rare) */
  @media (max-width: 1099px) {
    .oc-sessions-list { width: 300px !important; }
  }

  /* Tweaks panel: shrink on narrow screens so it doesn't swallow the UI */
  .oc-tweaks-panel { width: 320px; }
  @media (max-width: 1099px) {
    .oc-tweaks-panel { width: 280px !important; }
  }
  @media (max-width: 760px) {
    .oc-tweaks-panel {
      width: calc(100vw - 24px) !important;
      right: 12px !important; bottom: 12px !important;
    }
  }

  /* Data tables: allow horizontal scroll at narrow widths rather than breaking */
  .oc-table-scroll { overflow-x: auto; }
  .oc-table-scroll > * { min-width: 960px; }

  /* Overview: collapse 5-stat row to 2x/1x at narrow widths */
  @media (max-width: 1199px) {
    .oc-overview-split { grid-template-columns: 1fr !important; }
  }
  @media (max-width: 899px) {
    .oc-stats-row { grid-template-columns: repeat(2, 1fr) !important; }
    .oc-stats-cell:nth-child(2n) { border-right: 0 !important; }
    .oc-stats-cell { border-bottom: 1px solid var(--ink); }
  }
  @media (max-width: 520px) {
    .oc-stats-row { grid-template-columns: 1fr !important; }
    .oc-stats-cell { border-right: 0 !important; }
  }

  /* frames toggle: if off, soften hard ink rules down to line */
  body.frames-off .hardrule { background: var(--line) !important; }
  body.frames-off aside,
  body.frames-off header,
  body.frames-off main > div {
    border-color: var(--line) !important;
  }
</style>

  <script type="text/babel">

/* ===== icons ===== */
// Lucide-style icons, 1.5 stroke, round caps
const ICON_PATHS = {
  home: 'M3 12l9-9 9 9M5 10v10a1 1 0 0 0 1 1h3v-6h6v6h3a1 1 0 0 0 1-1V10',

  metrics: 'M3 18v-5 M9 18v-9 M15 18v-3 M21 18V6 M3 21h18',
  docs: 'M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20 M9 7h6 M9 11h6',
  plus: 'M12 5v14 M5 12h14',
  search: 'M11 19a8 8 0 1 0 0-16 8 8 0 0 0 0 16zM21 21l-4.3-4.3',
  chevron: 'M6 9l6 6 6-6',
  chevronR: 'M9 6l6 6-6 6',
  copy: 'M8 2h10a2 2 0 0 1 2 2v12 M16 6H6a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2z',

  link: 'M10 14a5 5 0 0 0 7 0l3-3a5 5 0 0 0-7-7l-1 1 M14 10a5 5 0 0 0-7 0l-3 3a5 5 0 0 0 7 7l1-1',

function Icon({ n, s = 16, w = 1.5, style }) {
  const d = ICON_PATHS[n];
  if (!d) return null;
  return (
    <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke="currentColor"

// LogoMark inline
function LogoMark({ size = 22 }) {

    <svg width={size} height={size} viewBox="0 0 64 64" role="img" aria-label="OpenClaw">

}

Object.assign(window, { Icon, LogoMark });


/* ===== primitives ===== */
const { useState, useEffect, useRef } = React;

// ---- Primitives for OpenClaw Managed Agents dashboard ----

function Button({ variant = 'secondary', size = 'md', icon, iconRight, children, onClick, style, disabled, className }) {
  const base = {
    display: 'inline-flex', alignItems: 'center', gap: 7,
    fontFamily: 'var(--font-sans)', fontWeight: 500,
    border: '1px solid transparent', borderRadius: 6, cursor: disabled ? 'not-allowed' : 'pointer',
    transition: 'background 120ms var(--ease), color 120ms var(--ease), border-color 120ms var(--ease)',
    letterSpacing: '-0.011em', whiteSpace: 'nowrap',
    opacity: disabled ? 0.5 : 1,
  };
  const sizes = {
    xs: { padding: '3px 8px', fontSize: 11 },
    sm: { padding: '5px 10px', fontSize: 12 },
    md: { padding: '7px 13px', fontSize: 13 },
  };
  const variants = {
    primary: { background: 'var(--accent, var(--lobster))', color: '#fff' },
    hard: { background: 'var(--ink)', color: 'var(--paper)' },
    secondary: { background: 'var(--card)', color: 'var(--ink)', borderColor: 'var(--line-2)' },
    ghost: { background: 'transparent', color: 'var(--ink-2)' },
    danger: { background: 'var(--card)', color: 'var(--danger)', borderColor: 'var(--line-2)' },
  };
  return (
    <button onClick={onClick} disabled={disabled} className={className} style={{ ...base, ...sizes[size], ...variants[variant], ...style }}>
      {icon && <Icon n={icon} s={size === 'xs' ? 11 : size === 'sm' ? 12 : 13} />}
      {children}
      {iconRight && <Icon n={iconRight} s={size === 'xs' ? 11 : size === 'sm' ? 12 : 13} />}
    </button>
  );
}

function Badge({ tone = 'neutral', children, dotOnly, style }) {
  const tones = {
    neutral: { bg: 'transparent', fg: 'var(--ink-2)', border: 'var(--line-2)', dot: 'var(--ink-3)' },
    ink:     { bg: 'var(--ink)', fg: 'var(--paper)', border: 'var(--ink)', dot: 'var(--paper)' },
    live:    { bg: 'var(--ink)', fg: 'var(--paper)', border: 'var(--ink)', dot: 'var(--accent, var(--lobster))' },
    ok:      { bg: 'transparent', fg: 'var(--ok)', border: 'var(--line-2)', dot: 'var(--ok)' },
    warn:    { bg: 'transparent', fg: 'var(--warn)', border: 'var(--line-2)', dot: 'var(--warn)' },
    err:     { bg: 'transparent', fg: 'var(--danger)', border: 'var(--line-2)', dot: 'var(--danger)' },
    soft:    { bg: 'var(--lobster-wash)', fg: 'var(--lobster-press)', border: 'var(--lobster-soft)', dot: 'var(--accent, var(--lobster))' },
  };
  const t = tones[tone];
  return (
    <span style={{
      display: 'inline-flex', alignItems: 'center', gap: 6,
      borderRadius: 9999, padding: dotOnly ? 4 : '2px 9px',
      fontSize: 11, fontWeight: 500,
      fontFamily: 'var(--font-sans)',
      background: t.bg, color: t.fg, border: `1px solid ${t.border}`,
      lineHeight: 1.4, ...style,
    }}>
      <span style={{
        width: 6, height: 6, borderRadius: '50%', background: t.dot,
        boxShadow: tone === 'live' ? '0 0 0 3px color-mix(in srgb, var(--accent, var(--lobster)) 28%, transparent)' : 'none',
        animation: tone === 'live' ? 'oc-pulse 2.4s var(--ease) infinite' : 'none',
      }} />
      {!dotOnly && children}
    </span>
  );
}

const Mono = ({ children, c, s = 12, bg, style, className }) => (
  <span className={className} style={{

/* ===== auth gate ===== */
// When the orchestrator has OPENCLAW_API_TOKEN set, all API calls
// require Authorization: Bearer <token>. The portal stores the token
// in localStorage and wraps fetch to inject it automatically. On 401,
// the token is cleared and the auth prompt re-shown.
const AUTH = {
  token: localStorage.getItem('openclaw_api_token') || '',
  required: false,
  set(t) { this.token = t; localStorage.setItem('openclaw_api_token', t); },
  clear() { this.token = ''; localStorage.removeItem('openclaw_api_token'); },
};
const _origFetch = window.fetch.bind(window);
window.fetch = function(url, opts) {
  if (AUTH.token && typeof url === 'string' && (url.startsWith('/v1/') || url.startsWith('/metrics'))) {
    opts = opts || {};
    opts.headers = { ...(opts.headers || {}), Authorization: 'Bearer ' + AUTH.token };
  }
  return _origFetch(url, opts).then(res => {
    if (res.status === 401 && typeof url === 'string' && url.startsWith('/v1/')) {
      AUTH.clear();
      AUTH.required = true;
      LIVE_BUS.notify();
    }
    return res;
  });
};

/* ===== data ===== */
const LIVE_BUS = (() => {
  const listeners = new Set();
  let version = 0;
  return {
    subscribe(cb) { listeners.add(cb); return () => listeners.delete(cb); },
    notify() { version++; for (const cb of listeners) { try { cb(version); } catch {} } },
    getVersion() { return version; },
  };
})();

function fmtAgo(ms) {
  const diff = Date.now() - ms;
  if (diff < 60_000) return Math.max(1, Math.round(diff / 1000)) + 's ago';
  if (diff < 3_600_000) return Math.round(diff / 60_000) + 'm ago';
  if (diff < 86_400_000) return Math.round(diff / 3_600_000) + 'h ago';
  return Math.round(diff / 86_400_000) + 'd ago';
}

function asDesignAgent(a, sessionCountById) {
  const toolsField = a.tools;
  const tools = Array.isArray(toolsField) ? toolsField : (toolsField?.also_allow || []);
  // Denied tools come from the permission_policy discriminated union.
  // Shape: { type:"deny", tools:[…] }  → listed tools are blocked.
  //        { type:"always_ask", tools?:[…] } → optional confirm-list.
  //        { type:"always_allow" }  → no deny set.
  // The legacy `tools.deny` shape was accepted in some early builds;
  // fall back to it so old rows still render correctly.
  const policyType = a.permission_policy?.type || 'always_allow';
  const policyTools = Array.isArray(a.permission_policy?.tools) ? a.permission_policy.tools : [];
  const denied = policyType === 'deny'
    ? policyTools
    : (Array.isArray(toolsField?.deny) ? toolsField.deny : []);
  const askList = policyType === 'always_ask' ? policyTools : [];
  return {
    id: a.agent_id,
    // Prefer the server-side name the user picked; fall back to the
    // id-stripped form so legacy agents (created without a name) still
    // render something readable instead of `undefined`.
    name: (typeof a.name === 'string' && a.name.trim()) || a.agent_id.replace(/^agt_/, ''),
    model: a.model,
    version: a.version || 1,
    tools,
    denied,
    askList,
    mcp: Object.keys(a.mcp_servers || {}),
    policy: policyType,
    permissionPolicy: a.permission_policy || { type: 'always_allow' },
    sessions: sessionCountById[a.agent_id] || 0,
    cost24h: '—',
    updated: a.updated_at ? fmtAgo(a.updated_at) : '—',
    channels: a.channels || {},
    thinkingLevel: a.thinking_level || 'off',
    // Full raw sub-objects preserved for the inspector's Config tab.
    mcpServers: a.mcp_servers || {},
    quota: a.quota || {},
    callableAgents: a.callable_agents || [],
    maxSubagentDepth: a.max_subagent_depth || 0,
    instructions: a.instructions || '',
  };
}

function asDesignSession(s, agentById, environmentById) {
  const agent = agentById[s.agent_id];
  const env = s.environment_id ? environmentById?.[s.environment_id] : undefined;
  const nowOrLast = s.status === 'running' ? Date.now() : (s.last_event_at || s.created_at);
  let status = s.status;
  if (s.status === 'failed' && typeof s.error === 'string' && /quota_exceeded|maxCostUsdPerSession|maxTokensPerSession|maxWallDurationMs/i.test(s.error)) {
    status = 'quota';
  }
  // Quotas come from the agent template. Fall back to the old hard-
  // coded caps only when the agent doesn't declare them (orphaned or
  // legacy), so the meters still render something reasonable.
  const quota = agent?.quota || {};
  const tokensCap = quota.maxTokensPerSession ?? 50_000;
  const costCap = quota.maxCostUsdPerSession ?? 1.00;
  // pool_source on the response is one of: cold, warm, limited, adopt
  // (null when no live container, e.g. idle+reaped). Map to a label
  // the design chose: "warm-reuse" for warm, otherwise the verb.
  const poolLabel = s.pool_source === 'warm'
    ? 'warm-reuse'
    : s.pool_source === 'cold'
      ? 'cold'
      : s.pool_source === 'limited'
        ? 'limited'
        : s.pool_source === 'adopt'
          ? 'adopted'
          : 'no container';
  return {
    id: s.session_id,
    agent: agent?.name || s.agent_id.replace(/^agt_/, ''),
    agentId: s.agent_id,
    agentVersion: agent?.version || null,
    agentFull: agent || null,
    envFull: env || null,
    // True when the agent template referenced by this session has been
    // deleted (hard-delete, not archive). The server correctly returns
    // 404 agent_not_found on any write to such a session — we surface
    // it as a persistent banner + disabled composer instead of letting
    // the user find out by trying to send.
    orphanedAgent: !agent,
    model: agent?.model || '',
    thinkingLevel: agent?.thinkingLevel || 'off',
    status,
    started: fmtAgo(s.created_at),
    createdAt: s.created_at,
    lastEventAt: s.last_event_at,
    wallMs: nowOrLast - s.created_at,
    tokensIn: s.tokens?.input || 0,
    tokensOut: s.tokens?.output || 0,
    tokens: (s.tokens?.input || 0) + (s.tokens?.output || 0),
    tokensCap,
    cost: s.cost_usd || 0,
    costCap,
    turns: s.turns || 0,
    env: s.environment_id || 'env_default',
    // Server-truth versions of env/container — used by RawTab so the
    // raw JSON panel shows `null` when the field is unset rather than
    // the UI-chrome fallback ("env_default", "—"). Elsewhere the UI
    // can keep the friendly fallback.
    envId: s.environment_id ?? null,
    container: s.container_name || (s.container_id ? s.container_id.slice(0, 12) : '—'),
    containerName: s.container_name ?? null,
    containerId: s.container_id || null,
    pool: poolLabel,
    poolSource: s.pool_source || null,
    bootMs: typeof s.boot_ms === 'number' ? s.boot_ms : null,
    output: s.output,
    error: s.error,
  };
}

function asDesignEvent(e, anchorTs) {
  const offsetMs = Math.max(0, e.created_at - anchorTs);
  const totalS = offsetMs / 1000;
  const mm = Math.floor(totalS / 60);
  const ss = totalS - mm * 60;
  const t = '+' + String(mm).padStart(2, '0') + ':' + ss.toFixed(3).padStart(6, '0');
  const base = { id: e.event_id || '', t, type: e.type };
  const contentStr = typeof e.content === 'string' ? e.content : JSON.stringify(e.content ?? '');
  if (e.type === 'user.message') return { ...base, actor: 'user', text: contentStr };
  if (e.type === 'agent.message') {
    const m = e.model || e.model_id;
    const short = m ? m.replace(/^[^/]+\//, '') : 'agent';
    return { ...base, actor: short, text: contentStr, model: m, tokensIn: e.tokens_in || e.tokens?.input, tokensOut: e.tokens_out || e.tokens?.output, costUsd: e.cost_usd };
  }
  if (e.type === 'agent.thinking') {
    const m = e.model || e.model_id;
    const short = m ? m.replace(/^[^/]+\//, '') : 'agent';
    return { ...base, actor: short, text: contentStr, model: m };
  }
  if (e.type === 'agent.tool_use') {
    return { ...base, actor: 'agent', tool: e.tool_name || '(tool)', args: e.tool_arguments || {}, toolUseId: e.tool_call_id };
  }
  if (e.type === 'agent.tool_result') {
    const summary = contentStr.length > 120 ? contentStr.slice(0, 117) + '…' : contentStr;
    return { ...base, actor: e.tool_name || 'tool', toolUseId: e.tool_call_id, summary, isError: !!e.is_error };
  }
  if (e.type === 'agent.tool_confirmation_request') {
    return { ...base, actor: 'orchestrator', toolUseId: e.approval_id || e.tool_call_id, policy: 'always_ask', prompt: contentStr };
  }
  if (e.type.startsWith('session.')) return { ...base, actor: 'orchestrator' };
  return { ...base, actor: 'system', text: contentStr };
}

const AGENTS = [];
const SESSIONS = [];
const EVENTS = [];
const AUDIT_ROWS = [];
const ENVIRONMENTS = [];
const VAULTS = [];
const HEALTH = { ok: false, version: '—', commit: 'unknown', uptimeMs: 0, startTs: null, maxWarm: 0 };
// Baseline labels rendered before the first pump lands. pumpSessions
// + pumpMetrics overwrite each slot with live values. The "· 24h"
// labels mean a real rolling 24-hour window (filtered on
// last_event_at); "· since boot" reflects a monotonic Prometheus
// counter that resets every orchestrator restart.
const STATS = [
  { label: 'Sessions · running',      value: '0',     sub: '—' },
  { label: 'Warm pool',               value: '0',     sub: '—' },
  { label: 'Tokens · 24h',            value: '—',     sub: '' },
  { label: 'Cost · 24h',              value: '$0.00', sub: '' },
  { label: 'Cold starts · since boot', value: '—',    sub: '' },
];

// STREAMING_TOKENS will be mutated live when an event stream is open
// on a running session (see openEventStream below). Starts empty.
let STREAMING_TOKENS = '';

let LIVE_SELECTED_SESSION = null;
let LIVE_EVENT_STREAM = null; // EventSource or null
let LIVE_EVENT_ANCHOR = null;
let SEEN_EVENT_IDS = new Set();
let _onUserMessageEvent = null;

async function pumpAgents() {
  if (AUTH.required && !AUTH.token) return;
  try {
    const res = await fetch('/v1/agents');
    if (!res.ok) return;
    const body = await res.json();
    const list = body.agents || [];
    const countById = {};
    for (const s of SESSIONS) countById[s.agentId] = (countById[s.agentId] || 0) + 1;
    // Newest first. Sort the raw server rows on created_at so the
    // "new agent just created" appears at the top of the Agents view
    // and at the top of dropdowns/pickers that read AGENTS. Ties
    // break on agent_id for stability.
    const sorted = list.slice().sort((a, b) => {
      const ta = a.created_at || 0;
      const tb = b.created_at || 0;
      if (tb !== ta) return tb - ta;
      return String(b.agent_id).localeCompare(String(a.agent_id));
    });
    const next = sorted.map((a) => asDesignAgent(a, countById));
    AGENTS.length = 0;
    for (const a of next) AGENTS.push(a);
    LIVE_BUS.notify();
  } catch {}
}

async function pumpSessions() {
  if (AUTH.required && !AUTH.token) return;
  try {
    const res = await fetch('/v1/sessions');
    if (!res.ok) return;
    const body = await res.json();
    const list = body.sessions || [];
    const agentById = Object.fromEntries(AGENTS.map((a) => [a.id, a]));
    const environmentById = Object.fromEntries(ENVIRONMENTS.map((e) => [e.id, e]));
    // Newest first, measured on most-recent activity (last event lands
    // → the session bubbles up). Sessions with no events yet fall back
    // to created_at so a fresh session still pops to the top immediately
    // after open. Status rank (running vs idle vs failed) is handled by
    // the filter tabs above the list, not by baked-in ordering — one
    // consistent "latest first" rule across every view.
    const next = list
      .map((s) => asDesignSession(s, agentById, environmentById))
      .sort((a, b) => {
        const ra = a.lastEventAt || a.createdAt || 0;
        const rb = b.lastEventAt || b.createdAt || 0;
        if (rb !== ra) return rb - ra;
        return String(b.id).localeCompare(String(a.id));
      });
    SESSIONS.length = 0;
    for (const s of next) SESSIONS.push(s);
    const running = next.filter((s) => s.status === 'running').length;
    // Honest rolling window. A session counts toward "last 24h" iff its
    // last_event_at falls in that window. This overcounts slightly
    // (the session's LIFETIME tokens get included even if only one
    // recent event landed in the window), but it's closer to truth
    // than the all-time sum we used to mislabel "· 24h". Proper
    // per-event aggregation would require scanning every session's
    // JSONL for the last day — not cheap on the UI render path.
    const nowMs = Date.now();
    const DAY_MS = 24 * 60 * 60 * 1000;
    const active24h = next.filter((s) => (s.lastEventAt || s.createdAt || 0) >= nowMs - DAY_MS);
    const totalTok24h  = active24h.reduce((t, s) => t + (s.tokens || 0), 0);
    const totalCost24h = active24h.reduce((t, s) => t + (s.cost || 0), 0);
    STATS[0] = {
      label: 'Sessions · running',
      value: String(running),
      sub: active24h.length + ' active · 24h',
    };
    STATS[2] = {
      label: 'Tokens · 24h',
      value: totalTok24h >= 1_000_000
        ? (totalTok24h / 1_000_000).toFixed(2) + 'M'
        : totalTok24h.toLocaleString(),
      sub: '',
    };
    STATS[3] = {
      label: 'Cost · 24h',
      value: '$' + totalCost24h.toFixed(2),
      sub: '',
    };
    // If the currently-selected session has been deleted (no longer in
    // the list), clear the selection so the App can auto-pick a live
    // row on the next render. Without this, SessionDetail keeps
    // holding the dead id and the event-poll keeps 404-ing. Also
    // tear down any live SSE stream pointing at the dead session.
    if (LIVE_SELECTED_SESSION && !next.some((s) => s.id === LIVE_SELECTED_SESSION)) {
      LIVE_SELECTED_SESSION = null;
      if (LIVE_EVENT_STREAM) {
        try { LIVE_EVENT_STREAM.close(); } catch {}
        LIVE_EVENT_STREAM = null;
      }
      EVENTS.length = 0;
      SEEN_EVENT_IDS = new Set();
    }
    LIVE_BUS.notify();
  } catch {}
}

// Plain-poll fallback for when SSE isn't available / fails.
async function pumpEventsPoll() {
  if (AUTH.required && !AUTH.token) return;
  if (!LIVE_SELECTED_SESSION || LIVE_EVENT_STREAM) return;
  try {
    const sid = LIVE_SELECTED_SESSION;
    const res = await fetch('/v1/sessions/' + encodeURIComponent(sid) + '/events?limit=300');
    // 404 = the session was deleted out from under the UI. Stop
    // re-querying the dead row — otherwise the 2s poll loop (and the
    // SSE-on-error fallback to this pump) spams the console with
    // "failed to load resource" forever. Clearing the selection also
    // lets the App auto-pick a fresh session on the next pumpSessions.
    if (res.status === 404) {
      LIVE_SELECTED_SESSION = null;
      EVENTS.length = 0;
      SEEN_EVENT_IDS = new Set();
      LIVE_BUS.notify();
      return;
    }
    if (!res.ok) return;
    const body = await res.json();
    const list = body.events || [];
    // Empty list = no events yet OR transient JSONL read failure.
    // Keep existing events (stale is better than empty). Only an
    // explicit 404 (session deleted, handled above) clears them.
    if (list.length === 0) return;
    const anchor = list[0].created_at;
    LIVE_EVENT_ANCHOR = anchor;
    const next = list.map((e) => asDesignEvent(e, anchor));
    // Replace with the full server snapshot — the HTTP endpoint
    // always returns the complete ordered event list.
    EVENTS.length = 0;
    SEEN_EVENT_IDS = new Set();
    for (const e of next) {
      if (e.id) SEEN_EVENT_IDS.add(e.id);
      EVENTS.push(e);
    }
    if (_onUserMessageEvent && list.some(e => e.type === 'user.message')) {
      _onUserMessageEvent(LIVE_SELECTED_SESSION, null);
    }
    LIVE_BUS.notify();
  } catch {}
}

// Real-time events via SSE. Replaces the poll with a persistent
// connection that pushes new events the instant they land in the Pi
// JSONL — no 1 s polling lag between the LLM emitting a tool_use
// and the UI showing it.
// Every event type the orchestrator emits on /v1/sessions/:id/events?stream=true.
// The server writes each frame with `event: <type>` (matches the Event's
// type field), which means EventSource delivers them to
// addEventListener(<type>, ...) — NOT to onmessage. Keep this list in
// sync with server.ts (grep: `writeSSE`) and with the EventRow switch
// in this file. Anything missing here silently never arrives in the
// portal until the SSE idle-timeout (~30s) ends the stream and the
// poll fallback kicks in — exactly the "slow messages" user-visible bug
// we hit in Apr 2026.
//
// `heartbeat` frames fire every 15s from the server keep-alive; they
// carry no conversational content, so we intentionally skip registering
// for them rather than let them clutter the rendered timeline.
const SSE_EVENT_TYPES = [
  'session.status_idle',
  'session.status_running',
  'session.status_failed',
  'session.model_change',
  'session.thinking_level_change',
  'user.message',
  'agent.message',
  'agent.thinking',
  'agent.tool_use',
  'agent.tool_result',
  'agent.tool_confirmation_request',
];

function openEventStream(sid) {
  if (LIVE_EVENT_STREAM) {
    try { LIVE_EVENT_STREAM.close(); } catch {}
    LIVE_EVENT_STREAM = null;
  }
  if (!sid) return;
  let url = '/v1/sessions/' + encodeURIComponent(sid) + '/events?stream=true';
  if (AUTH.token) url += '&token=' + encodeURIComponent(AUTH.token);
  let es;
  try { es = new EventSource(url); } catch { pumpEventsPoll(); return; }
  LIVE_EVENT_STREAM = es;
  // Do NOT clear EVENTS here — SSE catch-up will replay all events,
  // and dedup via SEEN_EVENT_IDS prevents duplicates. Clearing causes
  // the "events disappear" bug when Cloudflare drops the connection
  // and the stream reopens.
  STREAMING_TOKENS = '';

  const handler = (msg) => {
    if (sid !== LIVE_SELECTED_SESSION) return;
    let data;
    try { data = JSON.parse(msg.data); } catch { return; }
    if (!data || typeof data !== 'object') return;
    if (!data.type) data.type = msg.type;
    if (!data.event_id && msg.lastEventId) data.event_id = msg.lastEventId;
    if (typeof data.created_at !== 'number') {
      data.created_at = typeof data.ts === 'number' ? data.ts : Date.now();
    }
    const eid = data.event_id || '';
    if (eid && SEEN_EVENT_IDS.has(eid)) return;
    if (eid) SEEN_EVENT_IDS.add(eid);
    // Dedup status events by type — heartbeat can re-emit the same
    // status (e.g. session.status_failed) on every cycle. Only keep
    // the first one; subsequent emissions with the same type are
    // silently dropped.
    if (data.type && data.type.startsWith('session.status_')) {
      if (EVENTS.some(e => e.type === data.type)) return;
    }
    if (LIVE_EVENT_ANCHOR == null) LIVE_EVENT_ANCHOR = data.created_at;
    EVENTS.push(asDesignEvent(data, LIVE_EVENT_ANCHOR));
    if (data.type === 'user.message' && _onUserMessageEvent) _onUserMessageEvent(sid, data);
    LIVE_BUS.notify();
  };
  for (const t of SSE_EVENT_TYPES) es.addEventListener(t, handler);

  es.onerror = () => {
    // EventSource fires onerror on both transient drops (Cloudflare
    // closing idle connections) and terminal errors (session deleted).
    // readyState CONNECTING = browser is auto-reconnecting with
    // Last-Event-ID — let it. Only fall back to polling when the
    // connection is CLOSED (terminal).
    if (es.readyState === EventSource.CLOSED) {
      if (LIVE_EVENT_STREAM === es) LIVE_EVENT_STREAM = null;
      pumpEventsPoll();
    }
  };
}

async function pumpEnvironments() {
  if (AUTH.required && !AUTH.token) return;
  try {
    const res = await fetch('/v1/environments');
    if (!res.ok) return;
    const body = await res.json();
    // Newest first on created_at so new environments land at the top
    // of the Environments view + the session-inspector env picker.
    const list = (body.environments || []).slice().sort((a, b) => {
      const ta = a.created_at || 0;
      const tb = b.created_at || 0;
      if (tb !== ta) return tb - ta;
      return String(b.environment_id).localeCompare(String(a.environment_id));
    });
    const countById = {};
    for (const s of SESSIONS) countById[s.env] = (countById[s.env] || 0) + 1;
    const next = list.map((e) => {
      const packages = e.packages
        ? Object.entries(e.packages).filter(([, v]) => Array.isArray(v) && v.length)
            .map(([k, v]) => k + ': ' + v.join(', ')).join(' · ')
        : '—';
      const net = e.networking?.type === 'limited'
        ? 'limited · ' + (e.networking.allowed_hosts || []).slice(0, 2).join(', ')
        : 'unrestricted';
      return {
        id: e.environment_id,
        name: e.environment_id.replace(/^env_/, ''),
        packages: packages || '—',
        net,
        sessions: countById[e.environment_id] || 0,
        // Preserve raw fields so the ConfigTab inspector can render
        // per-manager package lists + networking.allowed_hosts. The
        // EnvironmentsView only reads the summary fields above.
        packagesRaw: e.packages || {},
        networkingRaw: e.networking || { type: 'unrestricted' },
      };
    });
    ENVIRONMENTS.length = 0;
    for (const e of next) ENVIRONMENTS.push(e);
    LIVE_BUS.notify();
  } catch {}
}

async function pumpAudit() {
  if (AUTH.required && !AUTH.token) return;
  try {
    const res = await fetch('/v1/audit?limit=50');
    if (!res.ok) return;
    const body = await res.json();
    const rows = body.events || body.entries || [];
    const next = rows.map((r) => ({
      ts: new Date(r.ts || r.timestamp || Date.now()).toISOString().replace('T', ' '),
      actor: r.actor || '—',
      action: r.action || '—',
      target: r.target || '—',
      outcome: r.outcome || 'ok',
    }));
    AUDIT_ROWS.length = 0;
    for (const r of next) AUDIT_ROWS.push(r);
    LIVE_BUS.notify();
  } catch {}
}

async function pumpHealth() {
  try {
    const res = await fetch('/healthz');
    if (!res.ok) return;
    const body = await res.json();
    HEALTH.ok = !!body.ok;
    HEALTH.version = body.version || '—';
    HEALTH.commit = body.commit || 'unknown';
    HEALTH.startTs = typeof body.start_ts === 'number' ? body.start_ts : HEALTH.startTs;
    HEALTH.uptimeMs = typeof body.uptime_ms === 'number' ? body.uptime_ms : 0;
    HEALTH.maxWarm = typeof body.max_warm === 'number' ? body.max_warm : 0;
    LIVE_BUS.notify();
  } catch {}
}

async function pumpVaults() {
  if (AUTH.required && !AUTH.token) return;
  try {
    const res = await fetch('/v1/vaults');
    if (!res.ok) return;
    const body = await res.json();
    // Newest first — same pattern as every other list.
    const list = (body.vaults || []).slice().sort((a, b) => {
      const ta = a.created_at || 0;
      const tb = b.created_at || 0;
      if (tb !== ta) return tb - ta;
      return String(b.vault_id).localeCompare(String(a.vault_id));
    });
    VAULTS.length = 0;
    for (const v of list) VAULTS.push(v);
    LIVE_BUS.notify();
  } catch {}
}

// Human-readable duration from milliseconds. Matches the sidebar-footer
// "Gateway up 14d 2h" format — hours for under-a-day, HhMmin for short
// uptimes, days+hours for anything longer.
function fmtUptime(ms) {
  if (!ms || ms < 0) return '—';
  const s = Math.floor(ms / 1000);
  const days = Math.floor(s / 86400);
  const hours = Math.floor((s % 86400) / 3600);
  const mins = Math.floor((s % 3600) / 60);
  if (days > 0) return `${days}d ${hours}h`;
  if (hours > 0) return `${hours}h ${mins}m`;
  return `${mins}m`;
}

async function pumpMetrics() {
  try {
    const res = await fetch('/metrics');
    if (!res.ok) return;
    const text = await res.text();
    // Prometheus lines always look like:
    //   metric_name{label1="v1",label2="v2",…} <value>
    // Our orchestrator sets `service="openclaw-managed-agents"` as a
    // default label, so every line has the `{…}` segment even for
    // metrics that didn't declare their own label names. The old
    // regex `^NAME\s+(\d+)` expected no label segment and therefore
    // matched nothing — STATS[1]/STATS[4] silently stuck at their
    // initial "0" / "—" baselines. Accept both shapes.
    const grab = (name, valuePat = '\\d+') => {
      const re = new RegExp(`^${name}(?:\\{[^}]*\\})?\\s+(${valuePat})`, 'm');
      const m = text.match(re);
      return m ? Number(m[1]) : null;
    };
    const warmActive = grab('pool_warm_containers');
    const activeCount = grab('pool_active_containers');
    if (warmActive !== null) {
      // The value is the live warm count; the sub shows the configured
      // target (max_warm from /healthz) so an operator on a cloud box
      // can see "0 / 3 target" and tell the difference between "this
      // deployment intends 3 warms but hasn't filled them" and "this
      // deployment opted out of warming" (max 0, as on a dev laptop).
      const target = HEALTH.maxWarm || 0;
      const targetStr = target > 0 ? 'target ' + target : 'warming off';
      const activeStr = activeCount != null ? activeCount + ' active' : '';
      STATS[1] = {
        label: 'Warm pool',
        value: String(warmActive),
        sub: activeStr ? activeStr + ' · ' + targetStr : targetStr,
      };
    }
    // Cold starts — sum across all agent labels. Monotonic Prom
    // counter, resets on orchestrator restart (hence "· since boot").
    // A real 24h counter would need a time-bucketed histogram we
    // don't persist yet.
    const coldLines = text.match(/^pool_cold_starts_total\{[^}]*\}\s+(\d+)/gm) || [];
    const coldTotal = coldLines.reduce((sum, line) => {
      const m = line.match(/\s(\d+)$/);
      return m ? sum + Number(m[1]) : sum;
    }, 0);
    // Avg boot from the histogram _sum / _count.
    const bootSum = grab('container_boot_duration_seconds_sum', '[\\d.eE+-]+');
    const bootCount = grab('container_boot_duration_seconds_count');
    const avgSecs = bootSum != null && bootCount && bootCount > 0 ? bootSum / bootCount : null;
    STATS[4] = {
      label: 'Cold starts · since boot',
      value: String(coldTotal),
      sub: avgSecs != null ? avgSecs.toFixed(1) + 's avg' : '—',
    };
    LIVE_BUS.notify();
  } catch {}
}

function liveSelectSession(id) {
  if (LIVE_SELECTED_SESSION === id) return;
  LIVE_SELECTED_SESSION = id;
  EVENTS.length = 0;
  SEEN_EVENT_IDS = new Set();
  LIVE_EVENT_ANCHOR = null;
  LIVE_BUS.notify();
  openEventStream(id);
}

// BEFORE the first pump fires so the pumps' early-return guard
// prevents 401 spam in the console.
(async () => {
  try {
    const res = await _origFetch('/v1/agents');
    if (res.status === 401) {
      AUTH.required = true;
      LIVE_BUS.notify();
    }
  } catch {}
  // Pumps start AFTER the probe — they'll bail immediately if auth
  // is required and no token is stored.
  pumpAgents();
  pumpSessions().then(() => pumpAgents());
  pumpEnvironments();
  pumpAudit();
  pumpMetrics();
  pumpHealth();
  pumpVaults();
})();

    ...(envId ? { environmentId: envId } : {}),
    ...(vaultId ? { vaultId } : {}),
    ...(quotaOverride ? { quotas: { maxCostUsd: costCap, maxTokens: tokenCap * 1000 } } : {}),
    ...(message.trim() ? { initialMessage: message.trim() } : {}),
  };

  async function submit() {
    if (creating || !agentId) return;
    setCreating(true);
    setError(null);
    const startedAt = Date.now();
    const postBody = {
      agentId,
      ...(envId && envId !== 'env_default' ? { environmentId: envId } : {}),
      ...(vaultId ? { vaultId } : {}),
    };
    try {
      const res = await fetch('/v1/sessions', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(postBody),
      });
      const ms = Date.now() - startedAt;
      const data = await res.json().catch(() => ({}));
      ctx?.pushToast?.({
        method: 'POST', path: '/v1/sessions', status: res.status, ms,
        label: res.ok
          ? `${agent?.name || 'agent'} · ${data.session_id || '—'}`
          : (data.message || data.error || `HTTP ${res.status}`),
      });
      if (!res.ok) {
        setError(data.message || data.error || `HTTP ${res.status}`);
        setCreating(false);
        return;
      }
      const newSid = data.session_id;
      // Optional initial message. sendMessage already pushes its own
      // toast for the follow-up POST /events — no need to double-toast.
      if (message.trim() && newSid && typeof ctx?.sendMessage === 'function') {
        await ctx.sendMessage(newSid, message.trim());
      }
      // Await the sessions pump so the new row exists before we select it.
      if (typeof pumpSessions === 'function') await pumpSessions();
      setCreating(false);
      onCreate?.(newSid);
    } catch (err) {
      const msg = err?.message || 'network error';
      setError(msg);
      setCreating(false);
      ctx?.pushToast?.({
        method: 'POST', path: '/v1/sessions', status: 0, ms: Date.now() - startedAt,
        label: msg,
      });
    }
  }

  // Auto-focus the textarea on mount so users can start typing immediately.
  useEffect(() => {
    const t = setTimeout(() => textareaRef.current?.focus(), 60);
    return () => clearTimeout(t);
  }, []);

  return (
    <div style={{
      flex: 1, display: 'flex', flexDirection: 'column',
      height: '100%', background: 'var(--paper)', overflow: 'hidden',
    }} data-screen-label="New session">
      {/* Header */}
      <div style={{
        padding: '18px 28px 14px',
        borderBottom: '1px solid var(--ink)',
        display: 'flex', alignItems: 'baseline', gap: 14,
      }}>
        <div style={{ minWidth: 0 }}>
          <Mono s={10} c="var(--ink-3)" style={{ letterSpacing: 0.6, textTransform: 'uppercase' }}>POST /v1/sessions</Mono>
          <div style={{ marginTop: 2, display: 'flex', alignItems: 'baseline', gap: 10 }}>
            <h1 style={{
              margin: 0, fontFamily: 'var(--font-sans)',
              fontWeight: 500, fontSize: 22, letterSpacing: '-0.025em', color: 'var(--ink)',
            }}>New session</h1>
            <Mono s={11} c="var(--ink-3)">— draft, not yet persisted</Mono>
          </div>
        </div>
        <div style={{ marginLeft: 'auto', display: 'flex', gap: 8 }}>
          <Button variant="ghost" size="sm" onClick={onCancel}>Cancel</Button>
          <Button variant="hard" size="sm" icon="send" onClick={submit} disabled={creating || !agentId}>
            {creating ? 'Creating…' : 'Create session'}
          </Button>
        </div>
      </div>

      {/* Body */}
      <div style={{ flex: 1, overflowY: 'auto' }}>
        <div style={{
          maxWidth: 920, margin: '0 auto', padding: '22px 28px 40px',
          display: 'flex', flexDirection: 'column', gap: 22,
        }}>
          {/* Agent picker */}
          <NsSection label="Agent" hint="Immutable config · version pinned at create-time">
            {agentsAvail.length === 0 && (
              <div style={{ padding: 12, fontSize: 13, color: 'var(--ink-3)' }}>
                No agents yet — create one from the Agents view first.
              </div>
            )}
            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(2, 1fr)', gap: 8 }}>
              {agentsAvail.map((a) => {
                const sel = a.id === agentId;
                return (
                  <button key={a.id} onClick={() => setAgentId(a.id)} style={{
                    all: 'unset', cursor: 'pointer', boxSizing: 'border-box',
                    padding: '12px 14px',
                    border: sel ? '1px solid var(--ink)' : '1px solid var(--line-2)',
                    background: sel ? 'var(--paper)' : 'var(--paper-2)',
                    borderRadius: 3,
                    transition: 'background 100ms var(--ease), border-color 100ms var(--ease)',
                  }}>
                    <div style={{ display: 'flex', alignItems: 'baseline', gap: 8 }}>
                      <span style={{ fontSize: 14, fontWeight: 500, color: 'var(--ink)', letterSpacing: -0.1 }}>{a.name}</span>
                      <Mono s={10} c="var(--ink-3)">v{a.version}</Mono>
                      {sel && (
                        <span style={{
                          marginLeft: 'auto', display: 'inline-flex', alignItems: 'center', gap: 4,
                          fontSize: 10, color: 'var(--ink)',
                        }}><Icon n="check" s={11} /> selected</span>
                      )}
                    </div>
                    <Mono s={11} c="var(--ink-2)" style={{ marginTop: 4 }}>{a.model}</Mono>
                    <div style={{ display: 'flex', gap: 8, marginTop: 8, flexWrap: 'wrap' }}>
                      <NsPolicyPill p={a.policy} />
                      <Mono s={10} c="var(--ink-3)">{a.tools.length} tools</Mono>
                      {a.mcp.length > 0 && <Mono s={10} c="var(--ink-3)">mcp: {a.mcp.join(', ')}</Mono>}
                    </div>
                  </button>
                );
              })}
            </div>
            {agent?.policy === 'deny' && (
              <div style={{
                marginTop: 10, padding: '8px 12px',
                background: 'color-mix(in srgb, var(--ink) 4%, var(--paper))',
                border: '1px solid var(--line-2)', borderRadius: 3,
                fontSize: 12, color: 'var(--ink-2)', lineHeight: 1.5,
              }}>
                <Mono s={10} c="var(--ink-3)">note ·</Mono>
                <span style={{ color: 'var(--ink)', marginLeft: 4 }}>policy=deny</span>
                {' '}will refuse every tool call. Sessions still run — model reasoning only.
              </div>
            )}
          </NsSection>

          {/* Environment + Vault row */}
          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 22 }}>
            <NsSection label="Environment" hint="Container image · /v1/environments">
              <div style={{ display: 'flex', flexDirection: 'column', gap: 4 }}>
                {envs.map((e) => {
                  const sel = e.id === envId;
                  const sub = e.packages && e.packages !== '—' ? e.packages : (e.net || '—');
                  return (
                    <button key={e.id} onClick={() => setEnvId(e.id)} style={{
                      all: 'unset', cursor: 'pointer',
                      padding: '9px 12px', borderRadius: 3,
                      border: '1px solid ' + (sel ? 'var(--ink)' : 'var(--line-2)'),
                      background: sel ? 'var(--paper)' : 'transparent',
                      display: 'flex', alignItems: 'center', gap: 10,
                    }}>
                      <div style={{
                        width: 12, height: 12, borderRadius: '50%',
                        border: '1px solid ' + (sel ? 'var(--ink)' : 'var(--ink-3)'),
                        background: sel ? 'var(--ink)' : 'transparent',
                        flexShrink: 0,
                      }} />
                      <div style={{ minWidth: 0, flex: 1 }}>
                        <Mono s={12} c="var(--ink)">{e.name}</Mono>
                        <Mono s={10} c="var(--ink-3)" style={{ marginLeft: 8 }}>{sub}</Mono>
                      </div>
                    </button>
                  );
                })}
              </div>
            </NsSection>

            <NsSection label="Credential vault" hint="Optional · mounts into /run/creds">
              <div style={{ display: 'flex', flexDirection: 'column', gap: 4 }}>
                {vaultOpts.map((v) => {
                  const sel = v.id === vaultId;
                  return (
                    <button key={v.id || 'none'} onClick={() => setVaultId(v.id)} style={{
                      all: 'unset', cursor: 'pointer',
                      padding: '9px 12px', borderRadius: 3,
                      border: '1px solid ' + (sel ? 'var(--ink)' : 'var(--line-2)'),
                      background: sel ? 'var(--paper)' : 'transparent',
                      display: 'flex', alignItems: 'center', gap: 10,
                    }}>
                      <div style={{
                        width: 12, height: 12, borderRadius: '50%',
                        border: '1px solid ' + (sel ? 'var(--ink)' : 'var(--ink-3)'),
                        background: sel ? 'var(--ink)' : 'transparent',
                        flexShrink: 0,
                      }} />
                      <div style={{ minWidth: 0, flex: 1 }}>
                        <Mono s={12} c="var(--ink)">{v.label}</Mono>
                        <Mono s={10} c="var(--ink-3)" style={{ marginLeft: 8 }}>{v.sub}</Mono>
                      </div>
                    </button>
                  );
                })}
              </div>
            </NsSection>
          </div>

          {/* Quotas */}
          <NsSection label="Quotas" hint="Default: inherit agent policy">
            <div style={{
              padding: '12px 14px',
              background: 'var(--paper-2)',
              border: '1px solid var(--line-2)', borderRadius: 3,
            }}>
              <label style={{ display: 'flex', alignItems: 'center', gap: 8, cursor: 'pointer' }}>
                <input type="checkbox" checked={quotaOverride} onChange={(e) => setQuotaOverride(e.target.checked)}
                  style={{ margin: 0, accentColor: 'var(--ink-2)' }} />
                <span style={{ fontSize: 13, color: 'var(--ink)' }}>Override session quotas</span>
                {!quotaOverride && <Mono s={10} c="var(--ink-3)" style={{ marginLeft: 'auto' }}>inheriting · $1.00 · 50k tok</Mono>}
              </label>
              {quotaOverride && (
                <>
                  <div style={{
                    marginTop: 12, display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 14,
                    paddingTop: 12, borderTop: '1px dashed var(--line-2)',
                  }}>
                    <NsQuotaField label="maxCostUsd" value={costCap} onChange={setCostCap}
                      step={0.10} min={0.10} max={10} fmt={(v) => '$' + v.toFixed(2)} />
                    <NsQuotaField label="maxTokens" value={tokenCap} onChange={setTokenCap}
                      step={10} min={10} max={500} fmt={(v) => v + 'k'} />
                  </div>
                  <Mono s={10} c="var(--ink-3)" style={{ marginTop: 10, display: 'block' }}>
                    note · per-session quotas aren't forwarded to the orchestrator today — the agent's template caps still apply. Override values are recorded locally until the server accepts them.
                  </Mono>
                </>
              )}
            </div>
          </NsSection>

          {/* Initial message */}
          <NsSection label="Initial message" hint="Optional · emits user.message immediately after 201">
            <div style={{
              border: '1px solid var(--line-2)', borderRadius: 4,
              background: 'var(--paper-2)',
              display: 'flex', flexDirection: 'column',
            }}>
              <textarea ref={textareaRef}
                value={message}
                onChange={(e) => setMessage(e.target.value)}
                onKeyDown={(e) => {
                  if (e.key === 'Enter' && (e.metaKey || e.ctrlKey)) { e.preventDefault(); submit(); }
                }}
                placeholder="What should this agent do? ⌘↵ to create."
                rows={5}
                style={{
                  width: '100%', boxSizing: 'border-box', border: 'none', outline: 'none',
                  background: 'transparent', padding: '12px 14px',
                  fontFamily: 'var(--font-sans)', fontSize: 14, lineHeight: 1.55,
                  color: 'var(--ink)', resize: 'vertical', minHeight: 90,
                  accentColor: 'var(--ink-2)',
                }} />
              <div style={{
                display: 'flex', alignItems: 'center', gap: 10,
                padding: '8px 12px',
                borderTop: '1px solid var(--line-2)',
                background: 'color-mix(in srgb, var(--ink) 2.5%, var(--paper))',
              }}>
                <Mono s={10} c="var(--ink-3)">{message.length} chars · ~{Math.max(1, Math.ceil(message.length / 4))} tokens</Mono>
                <Mono s={10} c="var(--ink-3)" style={{ marginLeft: 'auto' }}>⌘↵ create</Mono>
              </div>
            </div>
          </NsSection>

          {/* Request preview */}
          <NsSection label="Request preview"
            right={
              <button onClick={() => setShowJson((v) => !v)} style={{
                all: 'unset', cursor: 'pointer',
                fontFamily: 'var(--font-mono)', fontSize: 10, color: 'var(--ink-3)',
                letterSpacing: 0.4, textTransform: 'uppercase',
              }}>{showJson ? 'hide' : 'show'}</button>
            }
          >
            {showJson && (
              <pre style={{
                margin: 0, padding: '12px 14px',
                background: 'var(--ink)', color: 'var(--paper)',
                fontFamily: 'var(--font-mono)', fontSize: 11.5, lineHeight: 1.65,
                borderRadius: 3, overflowX: 'auto', border: '1px solid var(--ink)',
              }}>
{`POST /v1/sessions   ${new Date().toISOString().slice(11,19)}Z
Content-Type: application/json

${JSON.stringify(previewBody, null, 2)}`}
              </pre>
            )}
          </NsSection>

          {error && (
            <div style={{
              padding: '10px 12px',
              border: '1px solid var(--danger)',
              background: 'color-mix(in srgb, var(--danger) 8%, var(--card))',
              borderRadius: 4,
            }}>
              <div style={{ fontFamily: 'var(--font-mono)', fontSize: 10, color: 'var(--danger)', textTransform: 'uppercase', letterSpacing: '0.1em' }}>
                POST failed
              </div>
              <div style={{ marginTop: 4, fontSize: 13, color: 'var(--ink)', wordBreak: 'break-word' }}>
                {error}
              </div>
            </div>
          )}

          {/* Create footer */}
          <div style={{
            display: 'flex', alignItems: 'center', gap: 12,
            paddingTop: 8,
          }}>
            <Mono s={10} c="var(--ink-3)" style={{ flex: 1 }}>
              on 201 · session {agent?.name ? `(${agent.name})` : ''} boots · container warms from pool · first event streams within 400ms
            </Mono>
            <Button variant="ghost" size="sm" onClick={onCancel}>Discard</Button>
            <Button variant="hard" size="sm" icon="send" onClick={submit} disabled={creating || !agentId}>
              {creating ? 'Creating…' : 'Create session'}
            </Button>
          </div>
        </div>
      </div>
    </div>
  );
}

function NsSection({ label, hint, right, children }) {
  return (
    <div>
      <div style={{ display: 'flex', alignItems: 'baseline', gap: 10, marginBottom: 8 }}>
        <Mono s={10} c="var(--ink-3)" style={{ letterSpacing: 0.6, textTransform: 'uppercase' }}>{label}</Mono>
        {hint && <Mono s={10} c="var(--ink-3)" style={{ opacity: 0.7 }}>{hint}</Mono>}
        {right && <div style={{ marginLeft: 'auto' }}>{right}</div>}
      </div>
      {children}
    </div>
  );
}

function NsPolicyPill({ p }) {
  const map = {
    always_allow: { label: 'always_allow', bg: 'color-mix(in srgb, #2a7a43 14%, var(--paper))', fg: '#2a7a43' },
    always_ask:   { label: 'always_ask',   bg: 'color-mix(in srgb, var(--ink) 7%, var(--paper))', fg: 'var(--ink-2)' },
    deny:         { label: 'deny',         bg: 'color-mix(in srgb, var(--lobster) 14%, var(--paper))', fg: 'var(--lobster-press)' },
  };
  const c = map[p] || map.always_ask;
  return (
    <span style={{
      display: 'inline-flex', alignItems: 'center', gap: 4,
      padding: '1px 7px', borderRadius: 3,
      fontFamily: 'var(--font-mono)', fontSize: 10,
      background: c.bg, color: c.fg,
    }}>{c.label}</span>
  );
}

function NsQuotaField({ label, value, onChange, step, min, max, fmt }) {
  return (
    <div>
      <Mono s={10} c="var(--ink-3)" style={{ letterSpacing: 0.4, textTransform: 'uppercase' }}>{label}</Mono>
      <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginTop: 6 }}>
        <input type="range" min={min} max={max} step={step} value={value}
          onChange={(e) => onChange(parseFloat(e.target.value))}
          style={{ flex: 1, accentColor: 'var(--ink-2)' }} />
        <Mono s={12} c="var(--ink)" style={{ minWidth: 54, textAlign: 'right' }}>{fmt(value)}</Mono>
      </div>
    </div>
  );
}

Object.assign(window, { NewSessionPanel });


/* ===== session_detail ===== */
const { useState: useStateDetail, useEffect: useEffectDetail, useRef: useRefDetail } = React;

// Event row — this is the hero of the whole design.
// `session` (optional) is the parent session record; when present it
// powers the `session.status_running` row's real container + boot
// description (was previously a hardcoded mock string).
function EventRow({ e, streaming, session }) {
  // Orchestrator-internal bookkeeping. These fire at the top of every
  // run when the composer set a model/thinking override, and on every
  // idle→idle transition. They contain no conversational content and
  // clutter the stream — not in the design either. Hide them from the
  // timeline; they stay in the raw JSONL for operators who want them.
  if (
    e.type === 'session.model_change' ||
    e.type === 'session.thinking_level_change' ||
    e.type === 'session.status_idle'
  ) {
    return null;
  }
  const kindTone = {
    'session.status_running':  { tag: 'status', c: 'var(--ink-3)' },
    'session.status_failed':   { tag: 'status', c: 'var(--lobster)' },
    'user.message':            { tag: 'user',   c: 'var(--ink)' },
    'agent.thinking':          { tag: 'think',  c: 'var(--ink-3)' },
    'agent.message':           { tag: 'reply',  c: 'var(--ink)' },
    'agent.tool_use':          { tag: 'tool·use', c: 'var(--ink-2)' },
    'agent.tool_result':       null,
    'agent.tool_confirmation_request': { tag: 'approve?', c: 'var(--lobster-press)' },
  };
  let k = kindTone[e.type] || { tag: e.type, c: 'var(--ink-3)' };
  if (e.type === 'agent.tool_result') {
    k = e.isError ? { tag: 'tool·err', c: 'var(--danger)' } : { tag: 'tool·ok', c: 'var(--ok)' };
  }

  // Shared row shell: mono timestamp + type tag + content
  const Row = ({ children, approveRow }) => (
    <div style={{
      display: 'grid',
      gridTemplateColumns: '92px 92px 1fr',
      gap: 16,
      padding: '12px 24px',
      borderBottom: '1px solid var(--line)',
      background: approveRow ? 'var(--lobster-wash)' : 'transparent',
      borderLeft: approveRow ? '2px solid var(--accent, var(--lobster))' : '2px solid transparent',
    }}>
      <Mono s={11} c="var(--ink-3)">{e.t}</Mono>
      <div>
        <Mono s={11} c={k.c} style={{ textTransform: 'lowercase' }}>{k.tag}</Mono>
        {e.actor && (
          <div style={{ marginTop: 2 }}>
            <Mono s={10} c="var(--ink-4)">{e.actor}</Mono>
          </div>
        )}
      </div>
      <div>{children}</div>
    </div>
  );

  if (e.type === 'session.status_running') {
    // Render the real container + pool + boot numbers if the parent
    // session is available. On older sessions whose container has
    // been reaped (pool_source=null on the response) we fall back
    // to a truthful "no container" note rather than lying.
    const containerName = session?.containerId
      ? (session.containerName || session.containerId.slice(0, 12))
      : null;
    const bootMs = typeof session?.bootMs === 'number' ? session.bootMs : null;
    const poolSource = session?.poolSource || null;
    const poolLabel =
      poolSource === 'warm' ? 'warm-pool reuse' :
      poolSource === 'cold' ? 'cold spawn' :
      poolSource === 'limited' ? 'cold spawn · limited' :
      poolSource === 'adopt' ? 'adopted on restart' :
      'no container';
    return (
      <Row>
        <span style={{ fontSize: 12, color: 'var(--ink-3)' }}>
          {containerName ? (
            <>
              Container <code>{containerName}</code> attached · {poolLabel}
              {bootMs != null && bootMs > 0 && <> · {(bootMs / 1000).toFixed(1)}s boot</>}
              {bootMs === 0 && poolSource === 'warm' && <> · 0.0s boot</>}
            </>
          ) : (
            <>Session state · {poolLabel}</>
          )}
        </span>
      </Row>
    );
  }
  if (e.type === 'user.message') {
    return <Row>
      <p style={{ margin: 0, fontSize: 14, color: 'var(--ink)', lineHeight: 1.55, maxWidth: '62ch' }}>{e.text}</p>
    </Row>;
  }
  if (e.type === 'agent.thinking') {
    return <Row>
      <div style={{
        borderLeft: '1px solid var(--line-2)', paddingLeft: 12,
        fontSize: 13, color: 'var(--ink-3)', fontStyle: 'italic',
        lineHeight: 1.55, maxWidth: '62ch',
      }}>{e.text}</div>
      {e.model && <Mono s={10} c="var(--ink-4)" style={{ marginTop: 4 }}>{e.model}</Mono>}
    </Row>;
  }
  if (e.type === 'agent.message') {
    const toks = (e.tokensIn || 0) + (e.tokensOut || 0);
    return <Row>
      <div>
        <p style={{ margin: 0, fontSize: 14, color: 'var(--ink)', lineHeight: 1.6, maxWidth: '62ch', whiteSpace: 'pre-wrap' }}
           dangerouslySetInnerHTML={{ __html: (e.text || '').replace(/\*\*(.+?)\*\*/g, '<b>$1</b>').replace(/`([^`]+)`/g, '<code style="background:var(--paper-2);padding:1px 4px;border-radius:3px;font-size:0.9em">$1</code>') }} />
        {(toks > 0 || e.model) && (
          <div style={{ display: 'flex', gap: 12, marginTop: 6 }}>
            {toks > 0 && <Mono s={10} c="var(--ink-3)">↓ {toks} tok</Mono>}
            {e.model && <Mono s={10} c="var(--ink-4)">{e.model}</Mono>}
          </div>
        )}
      </div>
    </Row>;
  }
  if (e.type === 'agent.tool_use') {
    return <Row>
      <div style={{
        border: '1px solid var(--line-2)', borderRadius: 6,
        padding: '8px 10px', background: 'var(--card)',
        display: 'grid', gridTemplateColumns: 'auto 1fr auto', gap: 10,
        alignItems: 'center',
      }}>
        <span style={{
          width: 20, height: 20, borderRadius: 4,
          background: 'var(--ink)', color: 'var(--paper)',
          display: 'grid', placeItems: 'center',
        }}>
          <Icon n="terminal" s={11} />
        </span>
        <div>
          <Mono s={12} c="var(--ink)" style={{ fontWeight: 500 }}>{e.tool}</Mono>
          <Mono s={10} c="var(--ink-3)" style={{ marginLeft: 8 }}>{e.toolUseId}</Mono>
          <div style={{ marginTop: 2, fontFamily: 'var(--font-mono)', fontSize: 11, color: 'var(--ink-2)' }}>
            {JSON.stringify(e.args)}
          </div>
        </div>
        {e.needsApproval && <Badge tone="soft">pending</Badge>}
      </div>
    </Row>;
  }
  if (e.type === 'agent.tool_result') {
    const isErr = !!e.isError;
    return <Row>
      <div style={{
        display: 'flex', alignItems: 'center', gap: 10,
        padding: '6px 10px', border: `1px solid ${isErr ? 'var(--lobster-soft)' : 'var(--line)'}`, borderRadius: 6,
        background: isErr ? 'var(--lobster-wash)' : 'var(--paper-2)',
      }}>
        <Icon n={isErr ? 'close' : 'check'} s={12} style={{ color: isErr ? 'var(--danger)' : 'var(--ok)' }} />
        <Mono s={11} c="var(--ink-3)">{e.toolUseId}</Mono>
        <span style={{ fontSize: 12, color: isErr ? 'var(--danger)' : 'var(--ink-2)' }}>{e.summary}</span>
      </div>
    </Row>;
  }
  if (e.type === 'agent.tool_confirmation_request') {
    return <ApprovalRow e={e} />;
  }
  if (e.type === 'session.status_failed') {
    return (
      <Row>
        <span style={{ fontSize: 12, color: 'var(--lobster)' }}>
          Session failed{session?.error ? <> · <Mono s={11} c="var(--lobster)">{session.error}</Mono></> : null}
        </span>
      </Row>
    );
  }
  // Unknown event type — render minimally rather than fabricating
  // content. The tag column already shows the type name; here we
  // surface whatever textual payload exists so an operator on a
  // fresh event type still sees *something* while the handler is
  // being added.
  return (
    <Row>
      <span style={{ fontSize: 12, color: 'var(--ink-3)' }}>{e.text || <Mono s={11} c="var(--ink-4)">(no rendered content for {e.type})</Mono>}</span>
    </Row>
  );
}

function KV({ k, v, mono }) {

function SessionDetail({ sessionId, sessionState, streamLen }) {
  // Hook order note: every hook must run on every render. Keep all
  // hooks (useApp, useRef, useEffect) BEFORE any early return, or
  // React throws a "change in the order of Hooks called" warning.
  const ctx = useApp();
  const scrollRef = useRefDetail(null);
  useEffectDetail(() => {
    if (scrollRef.current) scrollRef.current.scrollTop = scrollRef.current.scrollHeight;
  }, [streamLen]);

  const s = SESSIONS.find((x) => x.id === sessionId) || SESSIONS[0];

  // Empty-state guard: the first render after a fresh page load runs
  // before pumpSessions has any data, so `s` is undefined. The design
  // expects SESSIONS to always be non-empty (mock data); we drop a
  // quiet placeholder until the pump catches up.
  if (!s) {
    return (
      <div style={{ flex: 1, display: 'flex', alignItems: 'center', justifyContent: 'center', color: 'var(--ink-3)', fontFamily: 'var(--font-mono)', fontSize: 12 }}>
        loading sessions…
      </div>
    );
  }

  // Derive displayed events + streaming based on state tweak.
  // The design's mock-data version sliced to {2, 3, 7} events for
  // visual effect — with real live data we show the whole stream.
  const rawStatus = sessionState || s.status;
  // Client-side "awaiting" derivation. The backend only exposes
  // idle | running | failed — there's no awaiting status in the
  // store. But the SSE stream emits agent.tool_confirmation_request
  // frames while the confirm-tools plugin holds a pending approval,
  // and we clear the local approval state once the user resolves.
  // Compare against the LATEST request's toolUseId so a second
  // approval in the same session (different tool call) re-triggers
  // awaiting even though the earlier approval was resolved.
  const latestReq = EVENTS.slice().reverse().find((e) => e.type === 'agent.tool_confirmation_request');
  const resolvedForThis =
    !!latestReq &&
    ctx?.approval?.toolUseId === latestReq.toolUseId &&
    (ctx.approval.status === 'approved' || ctx.approval.status === 'denied');
  const awaiting = rawStatus === 'running' && !!latestReq && !resolvedForThis;
  const effectiveStatus = awaiting ? 'awaiting' : rawStatus;
  // Decorate the matching agent.tool_use event with `needsApproval:
  // true` so EventRow can render the grey `pending` chip next to the
  // tool card. Matches on tool_call_id (the stable link between a
  // tool_use, its confirmation_request, and the eventual tool_result).
  const events = latestReq && !resolvedForThis
    ? EVENTS.map((ev) =>
        ev.type === 'agent.tool_use' && ev.toolUseId === latestReq.toolUseId
          ? { ...ev, needsApproval: true }
          : ev,
      )
    : EVENTS;

  const showStream = effectiveStatus === 'running';
  const partial = STREAMING_TOKENS.slice(0, streamLen || STREAMING_TOKENS.length);

  return (
    <div style={{ flex: 1, display: 'flex', flexDirection: 'column', height: '100%', background: 'var(--paper)', overflow: 'hidden' }}>
      {/* Session header */}
      <div style={{ padding: '18px 24px 14px', borderBottom: '1px solid var(--ink)' }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
          <Mono s={13} c="var(--ink)" style={{ fontWeight: 500 }}>{s.id}</Mono>
          <Icon n="copy" s={11} style={{ color: 'var(--ink-3)', cursor: 'pointer' }} />
          <Mono s={11} c="var(--ink-3)" style={{ marginLeft: 6 }}>· {s.agent}{s.agentVersion ? ' v' + s.agentVersion : ''} · {s.model || '—'}</Mono>
          <div style={{ marginLeft: 'auto', display: 'flex', gap: 8, alignItems: 'center' }}>
            <StatusBadge s={effectiveStatus} />
            <SessionHeaderActions sid={s.id} status={effectiveStatus} />
            <Button variant="ghost" size="sm" icon="external">Open JSONL</Button>
          </div>
        </div>
        <div style={{ display: 'flex', gap: 20, marginTop: 14 }}>
          <Stat label="Turns"  value={String(s.turns)} />
          <Stat label="Wall"   value={formatWall(s.wallMs)} />
          <Stat label="Tokens" value={(s.tokens/1000).toFixed(1)+'k'} meter={{v: s.tokens, cap: s.tokensCap, suffix: '/ 50k'}} />
          <Stat label="Cost"   value={'$'+s.cost.toFixed(3)} meter={{v: s.cost, cap: s.costCap, suffix: '/ $'+s.costCap.toFixed(2)}} hot={effectiveStatus==='quota'} />
          <Stat label="Container" value={s.container} mono sub={`boot ${(s.bootMs/1000).toFixed(1)}s · ${s.pool}`} />
        </div>
      </div>

      {/* Events + Inspector split */}
      <div className="oc-session-split" style={{ flex: 1, display: 'grid', gridTemplateColumns: '1fr 320px', minHeight: 0 }}>
        {/* Event stream */}
        <div style={{ display: 'flex', flexDirection: 'column', minHeight: 0, borderRight: '1px solid var(--line)' }}>
          <div style={{
            padding: '10px 24px', display: 'flex', alignItems: 'center', gap: 12,
            borderBottom: '1px solid var(--line)', background: 'var(--paper)',
          }}>
            <Eyebrow>Events · SSE</Eyebrow>
            <Mono s={10} c="var(--ink-3)">GET /v1/sessions/{s.id}/events?stream=true</Mono>
            <div style={{ marginLeft: 'auto', display: 'flex', gap: 10 }}>
              {showStream && <>
                <span style={{
                  width: 5, height: 5, borderRadius: '50%',
                  background: 'var(--accent, var(--lobster))',
                  boxShadow: '0 0 0 3px color-mix(in srgb, var(--accent, var(--lobster)) 22%, transparent)',
                  alignSelf: 'center',
                  animation: 'oc-pulse 2s var(--ease) infinite',
                }} />
                <Mono s={10} c="var(--ink-3)">tail · 42 tok/s</Mono>
              </>}
              {!showStream && <Mono s={10} c="var(--ink-3)">paused</Mono>}
            </div>
          </div>
          <div ref={scrollRef} style={{ flex: 1, overflowY: 'auto' }}>
            {events.map((e, i) => <EventRow key={e.id || e.t + ':' + i} e={e} session={s} />)}
            <SentMessagesFeed sid={s.id} />
            {showStream && <StreamingRow />}
            <CancelledBanner />
            {effectiveStatus === 'quota' && (
              <div style={{ padding: '24px', borderBottom: '1px solid var(--line)' }}>
                <Badge tone="warn">HTTP 429 · quota_exceeded</Badge>
                <p style={{ marginTop: 12, fontSize: 13, color: 'var(--ink)', maxWidth: '58ch', lineHeight: 1.55 }}>
                  Session refused further turns. <code>maxCostUsdPerSession</code> reached: $0.982 of $1.000. Open a new session on the same agent to continue, or bump the cap and retry.
                </p>
                <div style={{ display: 'flex', gap: 8, marginTop: 12 }}>
                  <Button variant="hard" size="sm">Raise cap to $2.00</Button>
                  <Button variant="secondary" size="sm">Open new session</Button>
                </div>
              </div>
            )}
            {effectiveStatus === 'failed' && (
              <div style={{ padding: '24px', borderBottom: '1px solid var(--line)' }}>
                <Badge tone="err">session.failed</Badge>
                <p style={{ marginTop: 12, fontSize: 13, color: 'var(--ink)', maxWidth: '58ch', lineHeight: 1.55 }}>
                  {s.error || 'Container failed to boot.'}
                </p>
              </div>
            )}
            {s.orphanedAgent && (
              <div style={{ padding: '24px', borderBottom: '1px solid var(--line)' }}>
                <Badge tone="err">agent_not_found</Badge>
                <p style={{ marginTop: 12, fontSize: 13, color: 'var(--ink)', maxWidth: '58ch', lineHeight: 1.55 }}>
                  Agent template <Mono s={12} c="var(--ink)">{s.agentId}</Mono> has been deleted. This session is read-only — POST /events will return 404. Open a session on a live agent to continue.
                </p>
              </div>
            )}
          </div>

          <Composer
            sid={s.id}
            effectiveStatus={effectiveStatus}
            orphaned={s.orphanedAgent}
            sessionModel={s.model}
            sessionThinking={s.thinkingLevel}
          />
        </div>

        {/* Inspector */}
        <SessionInspector s={s} status={effectiveStatus} />
      </div>
    </div>
  );
}

function Stat({ label, value, meter, hot, mono, sub }) {

      {meter && <Mono s={10} c="var(--ink-3)" style={{ marginTop: 2, display: 'block' }}>{meter.suffix}</Mono>}
      {sub && <Mono s={10} c="var(--ink-3)" style={{ marginTop: 2, display: 'block' }}>{sub}</Mono>}

}

function SessionInspector({ s, status }) {
