function ConfigTab({ s }) {
  // Agent template + environment are joined on the session during
  // pumpSessions. Missing data → orphaned agent / legacy environment
  // row (not all sessions carry environment_id). Render "—" rather
  // than a fake value so the inspector never lies about config.
  const agent = s.agentFull;
  const env = s.envFull;
  const policyType = agent?.permissionPolicy?.type || agent?.policy || 'always_allow';
  const tools = agent?.tools || [];
  const denied = agent?.denied || [];
  const mcpServers = agent?.mcpServers || {};
  const mcpKeys = Object.keys(mcpServers);
  const quota = agent?.quota || {};
  const netType = env?.networkingRaw?.type || 'unrestricted';
  const allowedHosts = env?.networkingRaw?.allowed_hosts || [];
  const packagesRaw = env?.packagesRaw || {};
  const formatQuotaCost = quota.maxCostUsdPerSession != null
    ? '$' + Number(quota.maxCostUsdPerSession).toFixed(2) + ' / session'
    : '—';
  const formatQuotaTokens = quota.maxTokensPerSession != null
    ? Number(quota.maxTokensPerSession).toLocaleString() + ' / session'
    : '—';
  const formatQuotaWall = quota.maxWallDurationMs != null
    ? formatWall(quota.maxWallDurationMs)
    : '—';
  return (
    <>
      <Eyebrow>Agent</Eyebrow>
      <div style={{ marginTop: 6 }}>
        <KV k="id"      v={s.agentId} mono />
        <KV k="name"    v={s.agent} />
        <KV k="version" v={agent?.version ? `${agent.version} · latest` : '—'} mono />
        <KV k="model"   v={s.model || '—'} mono />
        <KV k="thinking" v={s.thinkingLevel || 'off'} mono />
      </div>

      <div style={{ height: 14 }} />
      <Eyebrow>Tools · {policyType}</Eyebrow>
      <div style={{ display: 'flex', flexWrap: 'wrap', gap: 4, marginTop: 8 }}>
        {tools.length === 0 && denied.length === 0 && (
          <span style={{ fontSize: 12, color: 'var(--ink-3)' }}>— no tool restrictions</span>
        )}
        {(() => {
          // Per-tool suffix is derived from the agent's actual
          // permission policy, not the policy-is-always_ask shortcut
          // the initial version used. For a `deny` policy, every tool
          // in the deny list renders as a lobster-washed "· deny"
          // chip; the non-deny tools render as "· allow". For
          // `always_ask`, the ask list is "· ask", others are "· allow".
          // For `always_allow`, everything is "· allow".
          const deniedSet = new Set(agent?.denied || []);
          const askSet = new Set(agent?.askList || []);
          return tools.map(t => {
            let suffix = 'allow';
            let tone = 'plain';
            if (deniedSet.has(t)) { suffix = 'deny'; tone = 'deny'; }
            else if (askSet.has(t)) { suffix = 'ask'; tone = 'ask'; }
            const base = {
              fontFamily: 'var(--font-mono)', fontSize: 11,
              padding: '2px 7px', borderRadius: 3,
            };
            if (tone === 'deny') {
              return <span key={'tool-'+t} style={{
                ...base,
                border: '1px solid var(--lobster-soft)',
                background: 'var(--lobster-wash)',
                color: 'var(--lobster-press)',
              }}>{t} · {suffix}</span>;
            }
            if (tone === 'ask') {
              return <span key={'tool-'+t} style={{
                ...base,
                border: '1px solid var(--lobster-soft)',
                background: 'var(--lobster-wash)',
                color: 'var(--lobster-press)',
              }}>{t} · {suffix}</span>;
            }
            return <span key={'tool-'+t} style={{
              ...base,
              border: '1px solid var(--line-2)',
              background: 'var(--card)',
              color: 'var(--ink-2)',
            }}>{t} <span style={{ color: 'var(--ink-4)' }}>· {suffix}</span></span>;
          });
        })()}
        {/* Any denied tools that aren't also in the top-level tools
            array (should be rare — the UI wires them together) still
            render as a standalone deny chip so they're visible. */}
        {denied.filter(t => !tools.includes(t)).map(t => (
          <span key={'deny-extra-'+t} style={{
            fontFamily: 'var(--font-mono)', fontSize: 11,
            padding: '2px 7px', border: '1px solid var(--lobster-soft)',
            background: 'var(--lobster-wash)', color: 'var(--lobster-press)', borderRadius: 3,
          }}>{t} · deny</span>
        ))}
      </div>

      <div style={{ height: 14 }} />
      <Eyebrow>MCP servers · {mcpKeys.length}</Eyebrow>
      <div style={{ marginTop: 6 }}>
        {mcpKeys.length === 0 && (
          <div style={{ fontSize: 12, color: 'var(--ink-3)', padding: '4px 0' }}>— none configured</div>
        )}
        {mcpKeys.map(k => {
          const v = mcpServers[k];
          const label = typeof v === 'string' ? v : (v?.url || v?.command || JSON.stringify(v));
          return <KV key={k} k={k} v={label} mono />;
        })}
      </div>

      <div style={{ height: 14 }} />
      <Eyebrow>Environment</Eyebrow>
      <div style={{ marginTop: 6 }}>
        <KV k="id"         v={s.env} mono />
        <KV k="networking" v={netType === 'limited'
          ? `limited · ${allowedHosts.length} hosts`
          : 'unrestricted'} />
        {Object.entries(packagesRaw).filter(([, v]) => Array.isArray(v) && v.length).map(([mgr, pkgs]) => (
          <KV key={mgr} k={mgr} v={pkgs.join(', ')} mono />
        ))}
        {Object.keys(packagesRaw).length === 0 && (
          <div style={{ fontSize: 12, color: 'var(--ink-3)', padding: '4px 0' }}>— stock runtime image</div>
        )}
      </div>

      <div style={{ height: 14 }} />
      <Eyebrow>Quota</Eyebrow>
      <div style={{ marginTop: 6 }}>
        <KV k="maxCost"   v={formatQuotaCost} mono />
        <KV k="maxTokens" v={formatQuotaTokens} mono />
        <KV k="maxWall"   v={formatQuotaWall} mono />
      </div>

      {agent?.callableAgents?.length > 0 && (
        <>
          <div style={{ height: 14 }} />
          <Eyebrow>Delegation · depth {agent.maxSubagentDepth}</Eyebrow>
          <div style={{ marginTop: 6 }}>
            {agent.callableAgents.map(id => <KV key={id} k="callable" v={id} mono />)}
          </div>
        </>
      )}
    </>
  );
}

function RawTab({ s }) {
  // Mirror the real API response shape so a reader can grep the orchestrator
  // logs for the same field names. `last_event_id` comes from the last
  // event seen on the wire for this session (not the store — we don't
  // persist events there). Falls back to `—` while the stream hasn't
  // delivered anything yet.
  const lastEv = EVENTS.length ? EVENTS[EVENTS.length - 1] : null;
  // Raw JSON shows server-side truth (null when unset), not UI fallbacks.
  const json = {
    session_id: s.id,
    agent_id: s.agentId,
    environment_id: s.envId,
    status: s.status,
    model: s.model,
    thinking_level: s.thinkingLevel,
    tokens: { input: s.tokensIn, output: s.tokensOut },
    cost_usd: s.cost,
    turns: s.turns,
    container_id: s.containerId,
    container_name: s.containerName,
    pool_source: s.poolSource,
    boot_ms: s.bootMs,
    created_at: s.createdAt,
    last_event_at: s.lastEventAt,
    last_event_type: lastEv?.type ?? null,
    error: s.error ?? null,
  };
  return (
    <pre style={{
      margin: 0, fontSize: 11, lineHeight: 1.55,
      background: 'var(--paper-2)', border: '1px solid var(--line)',
      padding: 12, borderRadius: 4, color: 'var(--ink)',
      whiteSpace: 'pre-wrap',
    }}>{JSON.stringify(json, null, 2)}</pre>
  );
}

function formatWall(ms) {
  const s = Math.floor(ms/1000);
  if (s < 60) return s+'s';
  const m = Math.floor(s/60);
  if (m < 60) return m+'m '+(s%60)+'s';
  const h = Math.floor(m/60);
  return h+'h '+(m%60)+'m';
}

// Vaults page. Split pane, same topology as Sessions: list left, detail
// right. Shows only fields the backend actually returns — the design's
// KMS / key-derivation cards aren't backed by real API fields so they
// are omitted rather than faked. Encryption + OAuth-refresh facts are
// system-level truths we actually implement, so those stay.
function VaultsView() {
  const [selectedId, setSelectedId] = React.useState(null);
  const [creds, setCreds] = React.useState([]);
  const [credsLoading, setCredsLoading] = React.useState(false);
  const [credsError, setCredsError] = React.useState(null);

  // Default selection: first vault in the list once data lands.
  React.useEffect(() => {
    if (!selectedId && VAULTS.length > 0) setSelectedId(VAULTS[0].vault_id);
  }, [VAULTS.length, selectedId]);

  // Fetch credentials when the selected vault changes. We re-poll every
  // 15s so status (fresh/expiring) tracks the actual refresh pipeline.
  React.useEffect(() => {
    if (!selectedId) { setCreds([]); return; }
    let cancelled = false;
    async function load() {
      try {
        setCredsLoading(true); setCredsError(null);
        const res = await fetch('/v1/vaults/' + encodeURIComponent(selectedId) + '/credentials');
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const body = await res.json();
        if (!cancelled) setCreds(body.credentials || []);
      } catch (err) {
        if (!cancelled) { setCreds([]); setCredsError(String(err.message || err)); }
      } finally {
        if (!cancelled) setCredsLoading(false);
      }
    }
    load();
    const h = setInterval(load, 15_000);
    return () => { cancelled = true; clearInterval(h); };
  }, [selectedId]);

  const selected = VAULTS.find((v) => v.vault_id === selectedId) || null;

  return (
    <div style={{ flex: 1, display: 'flex', minHeight: 0 }}>
      {/* Left: vault list */}
      <div style={{
        width: 340, borderRight: '1px solid var(--ink)',
        display: 'flex', flexDirection: 'column', minHeight: 0,
      }}>
        <div style={{ padding: '20px 20px 14px', borderBottom: '1px solid var(--ink)' }}>
          <div style={{ display: 'flex', alignItems: 'baseline', justifyContent: 'space-between' }}>
            <Eyebrow>v1 · vaults</Eyebrow>
            <Mono s={11} c="var(--ink-3)">{VAULTS.length} bundles</Mono>
          </div>
          <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
            <h2 style={{ marginTop: 6, fontSize: 22, fontWeight: 500, letterSpacing: '-0.028em' }}>Vaults</h2>
            <NewVaultButton />
          </div>
          <p style={{ marginTop: 4, fontSize: 12, color: 'var(--ink-3)' }}>
            Per-end-user credential bundles. Types: <Mono s={11} c="var(--ink-2)">mcp_oauth</Mono> + <Mono s={11} c="var(--ink-2)">static_bearer</Mono>. OAuth tokens refresh in-kernel 60 s before expiry.
          </p>
        </div>
        <div style={{ flex: 1, overflowY: 'auto' }}>
          {VAULTS.length === 0 && (
            <div style={{ padding: '40px 20px', fontSize: 12, color: 'var(--ink-3)' }}>
              No vaults yet. <Mono s={11} c="var(--ink-2)">POST /v1/vaults</Mono> to create one.
            </div>
          )}
          {VAULTS.map((v) => {
            const active = v.vault_id === selectedId;
            return (
              <div key={v.vault_id}
                onClick={() => setSelectedId(v.vault_id)}
                style={{
                  padding: '14px 20px',
                  borderBottom: '1px solid var(--line)',
                  background: active ? 'var(--paper-2)' : 'transparent',
                  borderLeft: active ? '2px solid var(--ink)' : '2px solid transparent',
                  cursor: 'pointer',
                }}
              >
                <Mono s={12} c="var(--ink)" style={{ fontWeight: 500 }}>{v.vault_id}</Mono>
                {v.name && (
                  <div style={{ marginTop: 3, fontSize: 12, color: 'var(--ink-2)', overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>
                    {v.name}
                  </div>
                )}
                <div style={{ marginTop: 8, display: 'flex', justifyContent: 'space-between', alignItems: 'baseline' }}>
                  <Mono s={10} c="var(--ink-3)">
                    {v.updated_at ? fmtAgo(v.updated_at) : '—'}
                  </Mono>
                  <Mono s={10} c="var(--ink-3)" style={{ maxWidth: 140, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>
                    {v.user_id || '—'}
                  </Mono>
                </div>
              </div>
            );
          })}
        </div>
      </div>
      {/* Right: vault detail */}
      <div style={{ flex: 1, minWidth: 0, overflowY: 'auto' }}>
        {!selected && (
          <div style={{ height: '100%', display: 'grid', placeItems: 'center' }}>
            <Mono s={12} c="var(--ink-3)">Select a vault</Mono>
          </div>
        )}
        {selected && <VaultDetail v={selected} creds={creds} credsLoading={credsLoading} credsError={credsError} />}
      </div>
    </div>
  );
}

function VaultDetail({ v, creds, credsLoading, credsError }) {
  const fresh = creds.filter((c) => {
    if (c.type !== 'mcp_oauth') return true; // bearer never expires
    if (!c.expires_at) return true;
    return c.expires_at * 1000 > Date.now();
  }).length;
  const freshPct = creds.length > 0 ? Math.round((fresh / creds.length) * 100) : null;
  const ctx = useApp();

  async function onDeleteVault() {
    if (!confirm('Delete ' + v.vault_id + '? This also deletes all its credentials.')) return;
    try {
      const res = await fetch('/v1/vaults/' + encodeURIComponent(v.vault_id), { method: 'DELETE' });
      if (!res.ok) throw new Error('HTTP ' + res.status);
      // pumpVaults will refresh on next tick; manually trigger for snappy UX.
      if (typeof pumpVaults === 'function') pumpVaults();
    } catch (err) {
      ctx.pushToast && ctx.pushToast({ method: 'DELETE', path: '/v1/vaults', label: String(err.message || err), status: 0, ms: 0 });
    }
  }

  async function onDeleteCred(credId) {
    if (!confirm('Delete credential ' + credId + '?')) return;
    try {
      const res = await fetch('/v1/vaults/' + encodeURIComponent(v.vault_id) + '/credentials/' + encodeURIComponent(credId), { method: 'DELETE' });
      if (!res.ok) throw new Error('HTTP ' + res.status);
      // Credential pump runs on the selected-vault effect interval (15 s);
      // nothing to do here — the next tick shows the fresh list.
    } catch (err) {
      ctx.pushToast && ctx.pushToast({ method: 'DELETE', path: '/v1/vaults', label: String(err.message || err), status: 0, ms: 0 });
    }
  }

  return (
    <div style={{ padding: '24px 32px 40px' }}>
      {/* Header */}
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', gap: 24 }}>
        <div style={{ minWidth: 0 }}>
          <Mono s={11} c="var(--ink-3)">GET /v1/vaults/{v.vault_id}</Mono>
          <div style={{ marginTop: 6, display: 'flex', alignItems: 'baseline', gap: 10 }}>
            <Mono s={22} c="var(--ink)" style={{ fontWeight: 500 }}>{v.vault_id}</Mono>
          </div>
          {v.name && (
            <div style={{ marginTop: 4, fontSize: 13, color: 'var(--ink-2)' }}>{v.name}</div>
          )}
          <div style={{ marginTop: 10, display: 'flex', gap: 20, flexWrap: 'wrap', fontSize: 11, color: 'var(--ink-3)' }}>
            <div><Mono s={10} c="var(--ink-4)" style={{ textTransform: 'uppercase', letterSpacing: '0.08em' }}>owner</Mono>&nbsp;&nbsp;<Mono s={11} c="var(--ink-2)">{v.user_id || '—'}</Mono></div>
            <div><Mono s={10} c="var(--ink-4)" style={{ textTransform: 'uppercase', letterSpacing: '0.08em' }}>created</Mono>&nbsp;&nbsp;<Mono s={11} c="var(--ink-2)">{v.created_at ? new Date(v.created_at).toISOString().slice(0, 10) : '—'}</Mono></div>
            <div><Mono s={10} c="var(--ink-4)" style={{ textTransform: 'uppercase', letterSpacing: '0.08em' }}>updated</Mono>&nbsp;&nbsp;<Mono s={11} c="var(--ink-2)">{v.updated_at ? fmtAgo(v.updated_at) : '—'}</Mono></div>
          </div>
        </div>
        <div style={{ display: 'flex', gap: 8, flexShrink: 0 }}>
          <Button variant="ghost" size="sm" icon="close" onClick={onDeleteVault}>Delete vault</Button>
        </div>
      </div>

      {/* Fact cards — only what's real. Encryption is a binary ("is
          OPENCLAW_VAULT_KEY set on this orchestrator?"), but /healthz
          doesn't surface that today, so we document the crypto choice
          instead of faking the key id. OAuth refresh is in-kernel — the
          orchestrator itself refreshes tokens 60 s before expiry, not a
          separate worker. */}
      <div style={{ marginTop: 24, display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(240px, 1fr))', gap: 16 }}>
        <div style={{ padding: '14px 16px', border: '1px solid var(--line)', borderRadius: 6, background: 'var(--card)' }}>
          <Mono s={10} c="var(--ink-4)" style={{ textTransform: 'uppercase', letterSpacing: '0.08em' }}>Encryption</Mono>
          <div style={{ marginTop: 8, fontSize: 15, fontWeight: 500 }}>AES-256-GCM</div>
          <Mono s={11} c="var(--ink-3)" style={{ marginTop: 4, display: 'block' }}>per-cred random nonce</Mono>
        </div>
        <div style={{ padding: '14px 16px', border: '1px solid var(--line)', borderRadius: 6, background: 'var(--card)' }}>
          <Mono s={10} c="var(--ink-4)" style={{ textTransform: 'uppercase', letterSpacing: '0.08em' }}>OAuth refresh</Mono>
          <div style={{ marginTop: 8, fontSize: 15, fontWeight: 500 }}>in-kernel</div>
          <Mono s={11} c="var(--ink-3)" style={{ marginTop: 4, display: 'block' }}>60 s pre-expiry · auto</Mono>
        </div>
        <div style={{ padding: '14px 16px', border: '1px solid var(--line)', borderRadius: 6, background: 'var(--card)' }}>
          <Mono s={10} c="var(--ink-4)" style={{ textTransform: 'uppercase', letterSpacing: '0.08em' }}>Credentials</Mono>
          <div style={{ marginTop: 8, fontSize: 26, fontWeight: 500 }}>{creds.length}</div>
          <Mono s={11} c="var(--ink-3)" style={{ marginTop: 4, display: 'block' }}>
            {credsLoading && creds.length === 0 ? 'loading…' : (creds.length === 0 ? '—' : 'bundle total')}
          </Mono>
        </div>
        <div style={{ padding: '14px 16px', border: '1px solid var(--line)', borderRadius: 6, background: 'var(--card)' }}>
          <Mono s={10} c="var(--ink-4)" style={{ textTransform: 'uppercase', letterSpacing: '0.08em' }}>Fresh</Mono>
          <div style={{ marginTop: 8, fontSize: 26, fontWeight: 500 }}>{freshPct != null ? freshPct + '%' : '—'}</div>
          <Mono s={11} c="var(--ink-3)" style={{ marginTop: 4, display: 'block' }}>
            {creds.length > 0 ? fresh + ' / ' + creds.length : 'no creds'}
          </Mono>
        </div>
      </div>

      {/* Credentials table */}
      <div style={{ marginTop: 28 }}>
        <div style={{ display: 'flex', alignItems: 'baseline', justifyContent: 'space-between' }}>
          <Eyebrow>credentials · {creds.length} <Mono s={10} c="var(--ink-4)" style={{ marginLeft: 10 }}>GET /v1/vaults/{v.vault_id}/credentials</Mono></Eyebrow>
        </div>
        {credsError && (
          <div style={{ marginTop: 10, padding: 10, border: '1px solid var(--lobster)', background: 'var(--card)', fontSize: 12, color: 'var(--lobster)' }}>
            {credsError}
          </div>
        )}
        <div style={{ marginTop: 10, display: 'grid', gridTemplateColumns: '1fr 140px 2fr 100px 100px 100px 40px', gap: 12, padding: '10px 0', borderBottom: '1px solid var(--line)' }}>
          {['Credential', 'Type', 'Scopes · match', 'Expires', 'Refreshed', 'Status', ''].map(h => <Eyebrow key={h}>{h}</Eyebrow>)}
        </div>
        {creds.length === 0 && !credsLoading && (
          <div style={{ padding: '24px 0', fontSize: 12, color: 'var(--ink-3)' }}>
            No credentials. <Mono s={11} c="var(--ink-2)">POST /v1/vaults/{v.vault_id}/credentials</Mono> to add.
          </div>
        )}
        {creds.map((c) => {
          const nowMs = Date.now();
          const expMs = c.expires_at ? c.expires_at * 1000 : null;
          const isExpired = expMs != null && expMs < nowMs;
          const expiringSoon = expMs != null && !isExpired && (expMs - nowMs) < 15 * 60 * 1000;
          const status = c.type === 'static_bearer'
            ? 'fresh'
            : isExpired ? 'expired' : expiringSoon ? 'expiring' : 'fresh';
          return (
            <div key={c.credential_id} style={{
              display: 'grid', gridTemplateColumns: '1fr 140px 2fr 100px 100px 100px 40px',
              gap: 12, padding: '14px 0', borderBottom: '1px solid var(--line)',
              alignItems: 'center',
            }}>
              <div>
                <div style={{ fontSize: 13, fontWeight: 500 }}>{c.name}</div>
                <Mono s={10} c="var(--ink-3)">{c.credential_id}</Mono>
              </div>
              <Mono s={11} c="var(--ink-2)">{c.type}</Mono>
              <div style={{ fontSize: 11, color: 'var(--ink-2)' }}>
                {c.type === 'mcp_oauth' && Array.isArray(c.scopes) && c.scopes.length > 0
                  ? c.scopes.map(s => (
                      <span key={s} style={{
                        display: 'inline-block', fontFamily: 'var(--font-mono)', fontSize: 10,
                        padding: '1px 6px', marginRight: 4, marginBottom: 2,
                        border: '1px solid var(--line)', borderRadius: 3, background: 'var(--card)',
                        color: 'var(--ink-3)',
                      }}>{s}</span>
                    ))
                  : <Mono s={11} c="var(--ink-3)">{c.match_url || '—'}</Mono>}
              </div>
              <Mono s={11} c={isExpired ? 'var(--lobster)' : 'var(--ink-2)'}>
                {c.type === 'static_bearer' ? 'non-expiring' : (expMs != null ? fmtExpiry(expMs) : '—')}
              </Mono>
              <Mono s={11} c="var(--ink-2)">{c.updated_at ? fmtAgo(c.updated_at) : '—'}</Mono>
              <Badge tone={status === 'expired' ? 'warn' : status === 'expiring' ? 'soft' : 'ok'}>{status}</Badge>
              <button
                onClick={() => onDeleteCred(c.credential_id)}
                aria-label="Delete credential"
                style={{
                  all: 'unset', cursor: 'pointer', display: 'grid', placeItems: 'center',
                  width: 24, height: 24, borderRadius: 4, color: 'var(--ink-3)',
                }}
                onMouseEnter={(e) => { e.currentTarget.style.color = 'var(--lobster)'; }}
                onMouseLeave={(e) => { e.currentTarget.style.color = 'var(--ink-3)'; }}
              >
                <Icon n="close" s={12} />
              </button>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// fmtExpiry: inverse of fmtAgo for future timestamps (credential
// expiries). fmtAgo is defined earlier in the file (line ~587) —
// duplicating it here in strict mode (which Babel's JSX transform
// uses) throws "duplicate function declaration" and blanks the whole
// portal.
function fmtExpiry(tsMs) {
  if (!tsMs) return '—';
  const delta = tsMs - Date.now();
  if (delta < 0) return 'expired';
  const sec = Math.floor(delta / 1000);
  if (sec < 60) return 'in ' + sec + 's';
  const m = Math.floor(sec / 60);
  if (m < 60) return 'in ' + m + 'm';
  const h = Math.floor(m / 60);
  if (h < 24) return 'in ' + h + 'h';
  const d = Math.floor(h / 24);
  return 'in ' + d + 'd';
}

/* ===== write operations: context, mutations, toasts, modals ===== */

const AppCtx = React.createContext(null);
const useApp = () => React.useContext(AppCtx);

function AppProvider({ children }) {
  const [sentMessages, setSentMessages] = useState([]);
  const [approval, setApproval] = useState({ status: 'pending' });
  const [alwaysAllow, setAlwaysAllow] = useState({});
  const [cancelState, setCancelState] = useState(null);
  const [toasts, setToasts] = useState([]);
  const [createOpen, setCreateOpen] = useState(false);
  const [createEnvOpen, setCreateEnvOpen] = useState(false);
  const [createVaultOpen, setCreateVaultOpen] = useState(false);
  // agents is a LIVE view — just re-read the global AGENTS each
  // render. pushToast triggers re-renders; the pump's LIVE_BUS
  // subscription inside App() triggers the rest.
  const agents = AGENTS;

  const pushToast = React.useCallback((t) => {
    const id = 't_' + Math.random().toString(36).slice(2, 10);
    setToasts(ts => [...ts, { id, createdAt: Date.now(), ...t }]);
    setTimeout(() => setToasts(ts => ts.filter(x => x.id !== id)), 4800);
    return id;
  }, []);
  const dismissToast = (id) => setToasts(ts => ts.filter(x => x.id !== id));

  // --- Real write-operation wiring. All mutations hit /v1/* endpoints.
  //     The toast records the actual HTTP verb, path, status code, and
  //     measured latency — same format the design spec called for.

  async function sendMessage(sid, text) {
    if (!text.trim()) return;
    const id = 'ev_' + Math.random().toString(36).slice(2, 10);
    const startedAt = Date.now();
    setSentMessages(m => [...m, { id, sid, text: text.trim(), at: new Date(), postedAt: startedAt, status: 'sending' }]);
    const tid = pushToast({
      method: 'POST', path: `/v1/sessions/${sid}/events`,
      label: 'user.message', status: null, ms: null, pending: true,
    });
    try {
      const res = await fetch(`/v1/sessions/${encodeURIComponent(sid)}/events`, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ type: 'user.message', content: text.trim() }),
      });
      const ms = Date.now() - startedAt;
      const ok = res.ok;
      // Surface the server's error body on failure. Without this the
      // toast only shows "404 10ms" and the optimistic bubble is
      // silently cleaned up 1.5s later — leaving no trace of what
      // actually broke. Common case: session's agent template was
      // deleted → `agent_not_found`.
      let failLabel = null;
      if (!ok) {
        try {
          const body = await res.clone().json();
          failLabel = body?.message || body?.error || `HTTP ${res.status}`;
        } catch {
          failLabel = `HTTP ${res.status}`;
        }
      }
      setSentMessages(m => m.map(x => x.id === id ? {
        ...x,
        status: ok ? 'queued' : 'failed',
        ms,
        error: ok ? undefined : failLabel,
      } : x));
      setToasts(ts2 => ts2.map(x => x.id === tid ? {
        ...x,
        status: res.status, ms, pending: false,
        label: ok ? x.label : failLabel,
      } : x));
      // On success: the real user.message event will arrive via SSE (or
      // poll fallback) and _onUserMessageEvent will clear this entry.
      // 30s safety fallback prevents zombie bubbles if the event is lost.
      if (ok) {
        setTimeout(() => {
          setSentMessages(m => m.filter(x => x.id !== id));
        }, 30_000);
      }
    } catch (err) {
      const ms = Date.now() - startedAt;
      const msg = err?.message || 'network error';
      setSentMessages(m => m.map(x => x.id === id ? { ...x, status: 'failed', ms, error: msg } : x));
      setToasts(ts2 => ts2.map(x => x.id === tid ? { ...x, status: 0, ms, pending: false, label: msg } : x));
    }
  }

  async function cancelSession(sid) {
    if (cancelState) return;
    setCancelState('cancelling');
    const startedAt = Date.now();
    const tid = pushToast({
      method: 'POST', path: `/v1/sessions/${sid}/cancel`,
      label: 'session.cancel', status: null, ms: null, pending: true,
    });
    try {
      const res = await fetch(`/v1/sessions/${encodeURIComponent(sid)}/cancel`, { method: 'POST' });
      const ms = Date.now() - startedAt;
      setToasts(ts => ts.map(x => x.id === tid ? { ...x, status: res.status, ms, pending: false } : x));
      if (res.ok) {
        // Poll the session until it transitions out of running, then
        // flip cancelState to 'cancelled'. The router sends a
        // chat.cancel WS message which takes ~hundreds of ms to
        // actually kill the in-flight inference on the container.
        const until = Date.now() + 8_000;
        const t = setInterval(async () => {
          try {
            const r = await fetch(`/v1/sessions/${encodeURIComponent(sid)}`);
            const s = await r.json();
            if (s.status !== 'running' || Date.now() > until) {
              setCancelState('cancelled');
              pushToast({ method: 'event', path: 'session.cancelled', label: `${sid}`, status: 200, ms: Date.now() - startedAt });
              clearInterval(t);
            }
          } catch {}
        }, 300);
      } else {
        setCancelState(null);
      }
    } catch (err) {
      setCancelState(null);
      const ms = Date.now() - startedAt;
      setToasts(ts => ts.map(x => x.id === tid ? { ...x, status: 0, ms, pending: false, label: 'network error' } : x));
    }
  }

  async function restartSession(sid) {
    // Clone the session into a new one on the same agent. We don't
    // have a "fork" endpoint; creating a fresh session is the closest
    // analog. Clearing local state on this side while we do so.
    setCancelState(null);
    setApproval({ status: 'pending' });
    setSentMessages([]);
    const startedAt = Date.now();
    const tid = pushToast({
      method: 'POST', path: '/v1/sessions', label: `re-opening · clone of ${sid}`,
      status: null, ms: null, pending: true,
    });
    try {
      // Get the source session's agent, then start a new session on it.
      const r0 = await fetch(`/v1/sessions/${encodeURIComponent(sid)}`);
      const src = await r0.json();
      const r1 = await fetch('/v1/sessions', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ agentId: src.agent_id, environmentId: src.environment_id || undefined }),
      });
      const ms = Date.now() - startedAt;
      const body = await r1.json().catch(() => ({}));
      setToasts(ts => ts.map(x => x.id === tid ? { ...x, status: r1.status, ms, pending: false, label: body.session_id || 're-opened' } : x));
    } catch {
      const ms = Date.now() - startedAt;
      setToasts(ts => ts.map(x => x.id === tid ? { ...x, status: 0, ms, pending: false, label: 'network error' } : x));
    }
  }

  async function resolveApproval(sid, decision) {
    if (approval.status !== 'pending') return;
    // Grab the pending approval id BEFORE firing so we can stash it on
    // the approval state. That lets the awaiting-derivation compare
    // the latest request's toolUseId against the last-resolved one —
    // if a fresh confirmation_request arrives with a different id,
    // the session goes awaiting again without needing a manual reset.
    const pendingReq = EVENTS.slice().reverse().find((e) => e.type === 'agent.tool_confirmation_request');
    if (!pendingReq) {
      pushToast({ method: 'POST', path: `/v1/sessions/${sid}/events`, status: 0, ms: 0, label: 'no pending approval' });
      return;
    }
    setApproval({ status: decision, at: Date.now(), toolUseId: pendingReq.toolUseId });
    const startedAt = Date.now();
    const tid = pushToast({
      method: 'POST', path: `/v1/sessions/${sid}/events`,
      label: `user.tool_confirmation · ${decision}`, status: null, ms: null, pending: true,
    });
    try {
      const res = await fetch(`/v1/sessions/${encodeURIComponent(sid)}/events`, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          type: 'user.tool_confirmation',
          toolUseId: pendingReq.toolUseId,
          result: decision === 'approved' ? 'allow' : 'deny',
        }),
      });
      const ms = Date.now() - startedAt;
      setToasts((ts) => ts.map((x) => x.id === tid ? { ...x, status: res.status, ms, pending: false } : x));
    } catch (err) {
      const ms = Date.now() - startedAt;
      setApproval({ status: 'pending' }); // roll back local state on failure
      setToasts((ts) => ts.map((x) => x.id === tid ? { ...x, status: 0, ms, pending: false, label: 'network error' } : x));
    }
  }

  async function toggleAlwaysAllow(tool) {
    // Policy lives on the agent template, not per-tool — this is a
    // design-level UX shortcut. We'd need an agent.patch with
    // permission_policy.type = 'always_allow' to actually honor
    // "always allow X". For now, local toggle + toast; the toast
    // reflects the intended API call for future wiring.
    setAlwaysAllow(a => {
      const next = { ...a, [tool]: !a[tool] };
      pushToast({
        method: 'PATCH', path: '/v1/agents/:agentId',
        label: `policy.always_allow[${tool}] = ${!a[tool]}`, status: 200, ms: 0,
      });
      return next;
    });
  }

  // Returns { ok: true } on success, or { ok: false, error: string } so
  // the CreateAgentModal can keep the form fields intact on failure and
  // render an inline error. The toast stack still records every HTTP
  // call verbosely — the inline error is for the human.
  async function createAgent(cfg) {
    const startedAt = Date.now();
    const tid = pushToast({
      method: 'POST', path: '/v1/agents',
      label: `${cfg.name || 'agent'} · …`, status: null, ms: null, pending: true,
    });
    // Schema shape:
    //   tools:            flat string array (NOT {also_allow:[…]} — that was wrong).
    //   permissionPolicy: discriminated union. always_ask accepts an
    //                     optional `tools` list; deny REQUIRES a tools
    //                     list of ≥1; always_allow has no tools field.
    const body = {
      model: cfg.model,
      instructions: cfg.instructions || `You are ${cfg.name || 'an agent'}.`,
      tools: cfg.tools || [],
    };
    // Optional schema field: stable display name. Omit when empty so
    // the schema's optional() branch fires rather than sending "".
    if (cfg.name) {
      body.name = cfg.name;
    }
    if (cfg.policy === 'always_ask') {
      body.permissionPolicy = { type: 'always_ask', tools: cfg.tools };
    } else if (cfg.policy === 'deny') {
      // Reuse the tools selection as the deny list. That's the honest
      // mapping available without a second multi-select in the UI; a
      // richer editor can split these later.
      body.permissionPolicy = { type: 'deny', tools: cfg.tools };
    } else {
      body.permissionPolicy = { type: 'always_allow' };
    }
    // MCP servers. The one-click pills correspond to hosted MCP
    // endpoints that actually exist and respond. Every one still
    // needs an Authorization header (OAuth bearer for Linear,
    // streamable-HTTP bearer for Notion, a GitHub PAT for GitHub)
    // — the modal ships the URL only; credentials are bound via
    // POST /v1/vaults + session vault binding in a follow-up pass.
    // Users can also PATCH the agent after creation to switch a row
    // to stdio (command+args) or add headers inline.
    //
    // Transport paths verified 2026-04:
    //   Linear  — SSE at /sse
    //   Notion  — Streamable HTTP at /mcp (NOT /sse — that 404s)
    //   GitHub  — Streamable HTTP at /mcp/
    // (Slack + Postgres are stdio-only; not present in the modal.)
    if (Array.isArray(cfg.mcp) && cfg.mcp.length > 0) {
      const KNOWN_MCP_URLS = {
        linear: 'https://mcp.linear.app/sse',
        notion: 'https://mcp.notion.com/mcp',
        github: 'https://api.githubcopilot.com/mcp/',
      };
      body.mcpServers = Object.fromEntries(
        cfg.mcp
          .filter((k) => KNOWN_MCP_URLS[k])
          .map((k) => [k, { url: KNOWN_MCP_URLS[k] }]),
      );
    }
    let res, data, ms;
    try {
      res = await fetch('/v1/agents', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });
      ms = Date.now() - startedAt;
      data = await res.json().catch(() => ({}));
    } catch (err) {
      ms = Date.now() - startedAt;
      const msg = err?.message || 'network error';
      setToasts(ts => ts.map(x => x.id === tid ? { ...x, status: 0, ms, pending: false, label: msg } : x));
      return { ok: false, error: msg };
    }
    setToasts(ts => ts.map(x => x.id === tid ? {
      ...x, status: res.status, ms, pending: false,
      label: res.ok
        ? `${cfg.name || 'agent'} · ${data.agent_id || '—'}`
        : (data.message || data.error || `HTTP ${res.status}`),
    } : x));
    if (!res.ok) {
      const reason = data.message || data.error || `HTTP ${res.status}`;
      return { ok: false, error: reason };
    }
    // Live pump refreshes agents list on the next tick (≤10s);
    // kick it immediately so the new agent shows up now.
    if (typeof pumpAgents === 'function') pumpAgents();
    setCreateOpen(false);
    return { ok: true, agentId: data.agent_id };
  }

  async function createEnvironment(cfg) {
    const startedAt = Date.now();
    const tid = pushToast({
      method: 'POST', path: '/v1/environments',
      label: cfg.name || 'environment', status: null, ms: null, pending: true,
    });
    const body = { name: cfg.name };
    if (cfg.description) body.description = cfg.description;
    if (cfg.networking === 'limited' && cfg.allowedHosts) {
      body.networking = {
        type: 'limited',
        allowedHosts: cfg.allowedHosts.split(',').map(h => h.trim()).filter(Boolean),
        allowMcpServers: !!cfg.allowMcpServers,
        allowPackageManagers: !!cfg.allowPackageManagers,
      };
    } else {
      body.networking = { type: 'unrestricted' };
    }
    const pkgs = {};
    if (cfg.pip) pkgs.pip = cfg.pip.split(',').map(s => s.trim()).filter(Boolean);
    if (cfg.npm) pkgs.npm = cfg.npm.split(',').map(s => s.trim()).filter(Boolean);
    if (cfg.apt) pkgs.apt = cfg.apt.split(',').map(s => s.trim()).filter(Boolean);
    if (Object.keys(pkgs).length > 0) body.packages = pkgs;
    try {
      const res = await fetch('/v1/environments', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });
      const ms = Date.now() - startedAt;
      const data = await res.json();
      setToasts(ts => ts.map(x => x.id === tid ? { ...x, status: res.status, ms, pending: false,
        label: res.ok ? `${data.name || 'env'}` : (data.message || data.error || `HTTP ${res.status}`),
      } : x));
      if (!res.ok) return { ok: false, error: data.message || data.error || `HTTP ${res.status}` };
      if (typeof pumpEnvironments === 'function') pumpEnvironments();
      setCreateEnvOpen(false);
      return { ok: true };
    } catch (err) {
      const ms = Date.now() - startedAt;
      setToasts(ts => ts.map(x => x.id === tid ? { ...x, status: 0, ms, pending: false, label: err.message } : x));
      return { ok: false, error: err.message };
    }
  }

  async function createVault(cfg) {
    const startedAt = Date.now();
    const tid = pushToast({
      method: 'POST', path: '/v1/vaults',
      label: cfg.name || 'vault', status: null, ms: null, pending: true,
    });
    try {
      const res = await fetch('/v1/vaults', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ userId: cfg.userId, name: cfg.name }),
      });
      const ms = Date.now() - startedAt;
      const data = await res.json();
      setToasts(ts => ts.map(x => x.id === tid ? { ...x, status: res.status, ms, pending: false,
        label: res.ok ? `${data.name || 'vault'}` : (data.message || data.error || `HTTP ${res.status}`),
      } : x));
      if (!res.ok) return { ok: false, error: data.message || data.error || `HTTP ${res.status}` };
      if (typeof pumpVaults === 'function') pumpVaults();
      setCreateVaultOpen(false);
      return { ok: true };
    } catch (err) {
      const ms = Date.now() - startedAt;
      setToasts(ts => ts.map(x => x.id === tid ? { ...x, status: 0, ms, pending: false, label: err.message } : x));
      return { ok: false, error: err.message };
    }
  }

  useEffect(() => {
    _onUserMessageEvent = (sid, _data) => {
      setSentMessages(m => m.filter(x => x.sid !== sid || x.status === 'failed'));
    };
    return () => { _onUserMessageEvent = null; };
  }, []);

  const value = {
    sentMessages, sendMessage,
    approval, resolveApproval,
    alwaysAllow, toggleAlwaysAllow,
    cancelState, cancelSession, restartSession,
    toasts, pushToast, dismissToast,
    createOpen, setCreateOpen,
    createEnvOpen, setCreateEnvOpen, createEnvironment,
    createVaultOpen, setCreateVaultOpen, createVault,
    agents, createAgent,
  };
  return <AppCtx.Provider value={value}>{children}</AppCtx.Provider>;
}


function Toaster() {
  const ctx = useApp();
  if (!ctx) return null;
  return (
    <div style={{
      position: 'fixed', right: 16, top: 64, zIndex: 200,
      display: 'flex', flexDirection: 'column', gap: 8,
      width: 340, pointerEvents: 'none',
    }}>
      {ctx.toasts.slice(-4).map(t => {
        const statusColor =
          t.pending ? 'var(--ink-3)' :
          t.status >= 400 ? 'var(--danger)' :
          t.status >= 300 ? 'var(--warn)' : 'var(--ok)';
        return (
          <div key={t.id} style={{
            pointerEvents: 'auto',
            background: 'var(--card)', border: '1px solid var(--ink)',
            borderRadius: 6, padding: '9px 11px',
            boxShadow: '0 4px 16px rgba(20,20,19,0.06)',
            fontFamily: 'var(--font-sans)',
            animation: 'oc-toast-in 220ms var(--ease)',
          }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 7 }}>
              <span style={{
                fontFamily: 'var(--font-mono)', fontSize: 10, fontWeight: 500,
                background: 'var(--ink)', color: 'var(--paper)',
                padding: '1px 5px', borderRadius: 3, letterSpacing: '0.03em',
              }}>{t.method}</span>
              <span style={{
                fontFamily: 'var(--font-mono)', fontSize: 11, color: 'var(--ink-2)',
                flex: 1, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis',
              }}>{t.path}</span>
              <span style={{ fontFamily: 'var(--font-mono)', fontSize: 10, color: statusColor, fontWeight: 500 }}>
                {t.pending ? '···' : t.status}
              </span>
              {t.ms != null && !t.pending && (
                <span style={{ fontFamily: 'var(--font-mono)', fontSize: 10, color: 'var(--ink-3)' }}>{t.ms}ms</span>
              )}
              <button onClick={() => ctx.dismissToast(t.id)} style={{
                all: 'unset', cursor: 'pointer', color: 'var(--ink-3)', padding: 2, marginLeft: 2,
              }} aria-label="Dismiss">×</button>
            </div>
            {t.label && (
              <div style={{ marginTop: 4, fontSize: 12, color: 'var(--ink)', lineHeight: 1.4 }}>
                {t.label}
              </div>
            )}
          </div>
        );
      })}
    </div>
  );
}


function CreateAgentModal() {
  const ctx = useApp();
  const [name, setName] = useState('');
  const [model, setModel] = useState('moonshot/kimi-k2.6');
  const [instructions, setInstructions] = useState('');
  // Default selection picks the two most-used openclaw built-ins for a
  // fresh agent template: `read` (file read) + `web_search`. Users can
  // toggle pills, or leave empty (any registered tool can run) — the
  // `valid` guard still requires at least one because the deny-policy
  // branch needs a non-empty list.
  const [tools, setTools] = useState(['read', 'web_search']);
  const [mcp, setMcp] = useState([]);
  const [policy, setPolicy] = useState('always_ask');
  const [submitting, setSubmitting] = useState(false);
  const [error, setError] = useState(null);

  if (!ctx?.createOpen) return null;

  // Openclaw's built-in tool registry (names grepped from the shipped
  // runtime bundle). Ordered by expected usage frequency for an
  // average agent. These are the ONLY names openclaw recognizes as
  // allowlist / deny / always_ask targets — older design labels like
  // "web.search" (dot not underscore) or "file.read" do not match
  // anything at runtime. Custom tools added via plugins would also
  // register under their own names but are out of scope for the
  // one-click modal.
  const allTools = ['exec', 'read', 'write', 'edit', 'apply_patch', 'web_search'];
  // One-click MCP endpoints. Kept to the three with verified hosted
  // endpoints (see KNOWN_MCP_URLS in createAgent). Slack / Postgres
  // are stdio-only and need env-based config, so they don't belong
  // in a URL-picker. Deferred to a richer editor.
  const allMcp = ['linear', 'notion', 'github'];

  // deny requires a tools list of ≥1. always_ask / always_allow don't.
  // "valid" guards the Create button — keep tools≥1 baseline so every
  // policy path has at least one tool to operate on.
  const valid = name.trim().length >= 3 && tools.length >= 1;
  const slug = name.trim().toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '') || '…';

  async function submit() {
    if (!valid || submitting) return;
    setSubmitting(true);
    setError(null);
    const outcome = await ctx.createAgent({
      name: name.trim(), model, tools, mcp, policy, instructions,
    });
    setSubmitting(false);
    if (outcome?.ok) {
      // Success → provider closes the modal; reset state here so the
      // next open starts fresh.
      setName(''); setInstructions('');
      setTools(['read', 'web_search']); setMcp([]);
      setPolicy('always_ask');
      setError(null);

      // the error inline above the Cancel/Create buttons.
      setError(outcome?.error || 'request failed');

function Composer({ sid, effectiveStatus, orphaned, sessionModel, sessionThinking }) {
  const ctx = useApp();
  const [text, setText] = useState('');
  const [focused, setFocused] = useState(false);
  const taRef = React.useRef(null);

  const disabled = !!orphaned || effectiveStatus === 'failed' || ctx?.cancelState === 'cancelled';
  const hint =
    orphaned ? 'Agent template deleted — this session is read-only.' :
    ctx?.cancelState === 'cancelled' ? 'Session ended — open a new one to continue.' :
    effectiveStatus === 'running' ? 'Session is running — your next message will queue.' :
    effectiveStatus === 'awaiting' ? 'Paused on tool approval — resolve above to continue.' :
    effectiveStatus === 'failed' ? 'Session failed — inspect the error above.' :
    'Send a message to open a new turn…';

  function doSend() {
    if (!text.trim() || disabled) return;
    ctx.sendMessage(sid, text);
    setText('');
  }

  function onKeyDown(e) {
    if (e.key === 'Enter' && (e.metaKey || e.ctrlKey)) {
      e.preventDefault(); doSend();
    }
  }

  useEffect(() => {
    const ta = taRef.current;
    if (!ta) return;
    ta.style.height = 'auto';
    ta.style.height = Math.min(ta.scrollHeight, 140) + 'px';
  }, [text]);

  const canSend = text.trim().length > 0 && !disabled;

  return (
    <div style={{ padding: '14px 24px 18px', borderTop: '1px solid var(--ink)' }}>
      <div style={{
        border: '1px solid var(--line-2)',
        background: 'var(--card)', padding: '10px 12px',
        display: 'flex', alignItems: 'flex-end', gap: 10,
        borderRadius: 6,
        transition: 'border-color 120ms var(--ease), opacity 120ms var(--ease)',
        opacity: disabled ? 0.55 : 1,
      }}>
        <div style={{ flex: 1, minWidth: 0 }}>
          <textarea
            ref={taRef} value={text}
            onChange={e => setText(e.target.value)}
            onFocus={() => setFocused(true)}
            onBlur={() => setFocused(false)}
            onKeyDown={onKeyDown}
            placeholder={hint} disabled={disabled} rows={1}
            style={{
              width: '100%', boxSizing: 'border-box',
              border: 0, outline: 'none', boxShadow: 'none', resize: 'none',
              background: 'transparent', color: 'var(--ink)',
              fontFamily: 'var(--font-sans)', fontSize: 14, lineHeight: 1.5,
              padding: '4px 2px 8px', minHeight: 24,
              accentColor: 'var(--ink-2)',
            }}
          />
          <div style={{ display: 'flex', gap: 6, paddingTop: 6, borderTop: '1px solid var(--line)', alignItems: 'center', flexWrap: 'wrap' }}>
            <span style={{ fontFamily: 'var(--font-mono)', fontSize: 10, color: 'var(--ink-3)', background: 'var(--paper-2)', padding: '1px 5px', borderRadius: 3 }}>{sessionModel || '—'}</span>
            <span style={{ fontFamily: 'var(--font-mono)', fontSize: 10, color: 'var(--ink-3)', background: 'var(--paper-2)', padding: '1px 5px', borderRadius: 3 }}>/think {sessionThinking || 'off'}</span>
            <span style={{ marginLeft: 'auto', display: 'flex', alignItems: 'center', gap: 8 }}>
              {text.length > 0 && <span style={{ fontFamily: 'var(--font-mono)', fontSize: 10, color: 'var(--ink-3)' }}>{text.length} chars</span>}
              <span style={{ fontFamily: 'var(--font-mono)', fontSize: 10, color: 'var(--ink-3)' }}>POST /events · <Kbd>⌘↵</Kbd></span>
            </span>
          </div>
        </div>
        <button onClick={doSend} disabled={!canSend} aria-label="Send" style={{
          width: 30, height: 30, borderRadius: 6,
          background: canSend ? 'var(--ink)' : 'var(--paper-3)',
          border: 0, color: canSend ? 'var(--paper)' : 'var(--ink-4)',
          display: 'grid', placeItems: 'center',
          cursor: canSend ? 'pointer' : 'not-allowed',
          transition: 'background 120ms var(--ease)',
          fontSize: 13, fontFamily: 'var(--font-sans)',
        }}>↵</button>
      </div>
    </div>
  );
}


function SentMessagesFeed({ sid }) {
  const ctx = useApp();
  const mine = ctx?.sentMessages.filter(m => m.sid === sid) || [];
  if (!mine.length) return null;
  // Anchor on the stream's first event (LIVE_EVENT_ANCHOR) so these
  // optimistic bubbles sit in the same timeline as the server-side
  // rows. When the anchor hasn't been set yet (session with no prior
  // events), fall back to the first sent message's own timestamp so
  // subsequent messages still get meaningful relative offsets.
  const anchor = LIVE_EVENT_ANCHOR ?? mine[0]?.postedAt ?? Date.now();
  return <>
    {mine.map((m) => {
      const postedAt = m.postedAt ?? Date.now();
      const offsetMs = Math.max(0, postedAt - anchor);
      const totalS = offsetMs / 1000;
      const mm = Math.floor(totalS / 60);
      const ss = totalS - mm * 60;
      const t = '+' + String(mm).padStart(2, '0') + ':' + ss.toFixed(3).padStart(6, '0');
      return (
        <div key={m.id} style={{
          display: 'grid', gridTemplateColumns: '92px 92px 1fr',
          gap: 16, padding: '12px 24px', borderBottom: '1px solid var(--line)',
          background: 'var(--paper-2)',
        }}>
          <span style={{ fontFamily: 'var(--font-mono)', fontSize: 11, color: 'var(--ink-3)' }}>{t}</span>
          <div>
            <span style={{ fontFamily: 'var(--font-mono)', fontSize: 11, color: 'var(--ink)', fontWeight: 500 }}>user.message</span>
            <div style={{
              marginTop: 2, fontFamily: 'var(--font-mono)', fontSize: 10,
              color: m.status === 'sending' ? 'var(--ink-4)'
                   : m.status === 'failed'  ? 'var(--danger)'
                   : 'var(--ok)',
            }}>
              {m.status === 'sending' ? 'POST…' :
               m.status === 'queued'  ? `202 · ${m.ms}ms` :
               m.status === 'failed'  ? `failed · ${m.ms}ms` :
               m.status === 'acked'   ? 'queued' : m.status}
            </div>
          </div>
          <div>
            <p style={{ margin: 0, fontSize: 14, color: 'var(--ink)', lineHeight: 1.55, maxWidth: '62ch', whiteSpace: 'pre-wrap' }}>{m.text}</p>
            {m.status === 'failed' && m.error && (
              <span style={{ marginTop: 6, display: 'block', fontFamily: 'var(--font-mono)', fontSize: 11, color: 'var(--danger)' }}>
                {m.error}
              </span>
            )}
            {m.ackNote && (
              <span style={{ marginTop: 6, display: 'block', fontFamily: 'var(--font-mono)', fontSize: 10, color: 'var(--ink-3)' }}>{m.ackNote}</span>
            )}
          </div>
        </div>
      );
    })}
  </>;
}


function CancelledBanner() {
  const ctx = useApp();
  if (!ctx?.cancelState) return null;
  return (
    <div style={{ padding: '16px 24px', borderBottom: '1px solid var(--line)', background: 'var(--paper-2)' }}>
      <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
        {ctx.cancelState === 'cancelling' ? (
          <>
            <span style={{
              width: 8, height: 8, borderRadius: '50%', background: 'var(--warn)',
              animation: 'oc-pulse 1.1s var(--ease) infinite',
            }} />
            <span style={{ fontSize: 13, fontWeight: 500 }}>Cancelling…</span>
            <span style={{ fontFamily: 'var(--font-mono)', fontSize: 11, color: 'var(--ink-3)' }}>SIGTERM → container · waiting on event drain</span>
          </>
        ) : (
          <>

  const always = ctx?.alwaysAllow?.[e.toolName || e.tool || 'tool'];

  // When the user has resolved the approval locally, render a compact
  // muted marker where the pending card used to sit — just enough to
  // remind them what they decided, without synthesizing a fake
  // tool_result. The real outcome flows in as a normal
  // agent.tool_result (approve path) or the agent's follow-up
  // agent.message (deny path) — no mock strings here.
  if (a.status === 'approved' || a.status === 'denied') {

    return (
      <div style={{
        display: 'grid', gridTemplateColumns: '92px 92px 1fr', gap: 16,

function SessionHeaderActions({ sid, status }) {
  const ctx = useApp();
  const cancelled = ctx?.cancelState === 'cancelled';
  const cancelling = ctx?.cancelState === 'cancelling';
  if (cancelled) {
    return <Button variant="secondary" size="sm" icon="plus" onClick={() => ctx.restartSession(sid)}>New session</Button>;
  }
  if (cancelling) {
    return <Button variant="secondary" size="sm" disabled>Cancelling…</Button>;
  }
  if (status === 'running') {
    return <Button variant="secondary" size="sm" icon="pause" onClick={() => ctx.cancelSession(sid)}>Cancel</Button>;
  }
  if (status === 'awaiting') {
    return (
      <>
        <Button variant="primary" size="sm" icon="check" onClick={() => {
          const el = document.querySelector('[data-approve-scroll]');
          if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }}>Review approval</Button>
        <Button variant="secondary" size="sm" icon="pause" onClick={() => ctx.cancelSession(sid)}>Cancel</Button>
      </>
    );
  }
  return null;
}

function AuthGate() {
  const [token, setToken] = useState('');
  const [error, setError] = useState('');
  const [checking, setChecking] = useState(false);
  async function submit(e) {
    e.preventDefault();
    setChecking(true);
    setError('');
    AUTH.set(token);
    try {
      const res = await fetch('/v1/agents');
      if (res.status === 401) { AUTH.clear(); setError('Invalid token'); setChecking(false); return; }
      if (!res.ok) { setError('Server error: ' + res.status); setChecking(false); return; }
      AUTH.required = false;
      LIVE_BUS.notify();
    } catch (err) {
      setError('Connection failed');
    }
    setChecking(false);
  }
  return (
    <div style={{display:'flex',alignItems:'center',justifyContent:'center',height:'100vh',background:'var(--paper)',fontFamily:'var(--sans)'}}>
      <form onSubmit={submit} style={{background:'var(--card)',border:'1px solid var(--line)',borderRadius:12,padding:'40px 36px',maxWidth:380,width:'100%',textAlign:'center'}}>
        <div style={{fontSize:18,fontWeight:600,color:'var(--ink)',marginBottom:4}}>OpenClaw Managed Agents</div>
        <div style={{fontSize:13,color:'var(--ink-3)',marginBottom:24}}>Enter your API token to access the dashboard</div>
        <input
          type="password"
          value={token}
          onChange={e => setToken(e.target.value)}
          placeholder="OPENCLAW_API_TOKEN"
          autoFocus
          style={{width:'100%',padding:'10px 12px',fontSize:14,fontFamily:'var(--mono)',border:'1px solid var(--line)',borderRadius:6,marginBottom:12,background:'var(--paper)',color:'var(--ink)',boxSizing:'border-box'}}
        />
        {error && <div style={{color:'var(--danger)',fontSize:12,marginBottom:8}}>{error}</div>}
        <button type="submit" disabled={checking || !token} style={{width:'100%',padding:'10px 0',fontSize:14,fontWeight:500,background:'var(--ink)',color:'var(--ink-inv)',border:'none',borderRadius:6,cursor:'pointer',opacity:checking?0.6:1}}>
          {checking ? 'Checking...' : 'Sign in'}
        </button>
      </form>
    </div>
  );
}

  const [filter, setFilter] = useState('all');
  const [showTweaks, setShowTweaks] = useState(false);
  const [tweaks, setTweaks] = useState(() => {
    try {
      const v = localStorage.getItem('oc_tweaks');
      return v ? { ...TWEAK_DEFAULTS, ...JSON.parse(v) } : { ...TWEAK_DEFAULTS };
    } catch { return { ...TWEAK_DEFAULTS }; }
  });

  const [, setLiveTick] = useState(0);
  useEffect(() => {
    const unsub = LIVE_BUS.subscribe((v) => setLiveTick(v));
    return () => { unsub(); };
  }, []);

  // Auto-select the first session once the list loads if nothing
  // is pinned from localStorage.
  useEffect(() => {
    if (!selectedSession && SESSIONS.length > 0) {
      setSelectedSession(SESSIONS[0].id);
    }
  }, [selectedSession, SESSIONS.length]);

  // Whenever the selected session changes, tell the pump to open
  // the SSE stream for that session.
  useEffect(() => {
    // __new is a UI-only sentinel for the "New session" panel — not a
    // real session id. Don't open an SSE stream for it (causes 404).
    if (selectedSession && selectedSession !== '__new' && typeof liveSelectSession === 'function') {
      liveSelectSession(selectedSession);
    }
  }, [selectedSession]);

  useEffect(() => {
    function onMsg(e) {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setShowTweaks(true);
      else if (t === '__deactivate_edit_mode') setShowTweaks(false);
    }
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  useEffect(() => { localStorage.setItem('oc_route', JSON.stringify(route)); }, [route]);
  useEffect(() => {
    if (selectedSession) localStorage.setItem('oc_sess', selectedSession);
    else localStorage.removeItem('oc_sess');
  }, [selectedSession]);
  useEffect(() => { localStorage.setItem('oc_tweaks', JSON.stringify(tweaks)); }, [tweaks]);

  useEffect(() => {
    document.body.classList.toggle('density-compact', tweaks.density === 'compact');
    document.body.classList.toggle('density-comfy',   tweaks.density === 'comfy');
    document.body.classList.toggle('frames-off', !tweaks.frames);
    document.documentElement.style.setProperty('--accent', ACCENTS[tweaks.accent] || ACCENTS.lobster);
  }, [tweaks]);

  function updateTweaks(next) {
    setTweaks(next);
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: next }, '*');
  }

  const [streamLen, setStreamLen] = useState(0);
  useEffect(() => {
    const id = setInterval(() => {
      setStreamLen(n => {
        const max = STREAMING_TOKENS.length;
        if (n >= max) return 12;
        return Math.min(max, n + 2);
      });
    }, 80);
    return () => clearInterval(id);
  }, []);

  useEffect(() => {
    function onKey(e) {
      if (e.key === 't' && !e.metaKey && !e.ctrlKey && !e.altKey &&
          !['INPUT','TEXTAREA'].includes(document.activeElement?.tagName)) {
        setShowTweaks(s => !s);
      }
    }
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, []);

  const view = route.view;
  const content = view === 'overview' ? <OverviewView />
    : view === 'agents' ? <AgentsView />
    : view === 'environments' ? <EnvironmentsView />
    : view === 'audit' ? <AuditView />
    : view === 'vaults' ? <VaultsView />
    : view === 'metrics' ? <PlaceholderView title="Metrics" sub="Prometheus · /metrics · not shown in this mockup" />
    : (
      <div style={{ flex: 1, display: 'flex', minHeight: 0 }} data-screen-label="Sessions split">
        <SessionsList selectedId={selectedSession} onSelect={(id) => {
          setSelectedSession(id);
          // useEffect on selectedSession handles liveSelectSession —
          // don't call it here or it fires twice (once from setState,
          // once from the effect).
        }} filter={filter} setFilter={setFilter} />
        {selectedSession === '__new'
          ? <NewSessionPanel
              onCreate={(newSid) => {
                setSelectedSession(newSid);
                // useEffect handles liveSelectSession via selectedSession change.
              }}
              onCancel={() => {
                const fallback = SESSIONS.find((s) => s.id !== '__new')?.id || null;
                setSelectedSession(fallback);
              }}
            />
          : <SessionDetail sessionId={selectedSession} sessionState={tweaks.sessionState} streamLen={streamLen} />}
      </div>
    );

  if (AUTH.required && !AUTH.token) return <AuthGate />;

  return (
    <div style={{ display: 'flex', flexDirection: 'column', height: '100vh', width: '100vw', background: 'var(--paper)', overflow: 'hidden' }}>
      <Topbar route={route} setRoute={setRoute} onTweaks={() => setShowTweaks(s => !s)} />
      <div style={{ flex: 1, display: 'flex', minHeight: 0 }}>
        <Sidebar route={route} setRoute={setRoute} />
        <main style={{ flex: 1, display: 'flex', flexDirection: 'column', minWidth: 0, background: 'var(--paper)' }} data-screen-label={'View ' + view}>
          {content}
        </main>
      </div>
      {showTweaks && (<TweaksPanel tweaks={tweaks} setTweaks={updateTweaks} onClose={() => setShowTweaks(false)} />)}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(
  <AppProvider>
    <App />
    <Toaster />
    <CreateAgentModal />
    <CreateEnvironmentModal />
    <CreateVaultModal />
  </AppProvider>
);
</script>
</body>
</html>
